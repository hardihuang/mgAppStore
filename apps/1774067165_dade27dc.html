<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryzon Agent (2D)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            overflow: hidden;
            background: #000;
            color: #fff;
        }

        /* 游戏UI */
        .ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .ui h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #00f, 0 0 30px #00f;
            background: linear-gradient(90deg, #00f, #0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .ui p {
            font-size: 20px;
            margin-bottom: 30px;
        }

        .ui button {
            padding: 15px 30px;
            font-size: 18px;
            background: linear-gradient(90deg, #00f, #0080ff);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 10px #00f;
        }

        .ui button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #00f;
        }

        /* 计分板 & 子弹信息 */
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            z-index: 50;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
            border: 1px solid #00f;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        .ammo-info {
            margin-top: 8px;
            font-size: 18px;
            color: #0ff;
        }
        .bullet-type {
            font-weight: bold;
            text-transform: uppercase;
        }

        /* 隐藏鼠标（游戏中） */
        .cursor-hidden {
            cursor: none;
        }

        #gameCanvas {
            display: block;
            background: #0a0a1a;
        }

        /* 准星 */
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            z-index: 60;
            display: none;
        }
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
        }
        .crosshair::before {
            width: 2px;
            height: 10px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .crosshair::after {
            width: 10px;
            height: 2px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        /* 不同子弹准星样式 */
        .crosshair.shotgun {
            border: 2px solid #ff8800;
        }
        .crosshair.shotgun::before, .crosshair.shotgun::after {
            background: #ff8800;
        }
        .crosshair.laser {
            border: 2px solid #00ff00;
        }
        .crosshair.laser::before, .crosshair.laser::after {
            background: #00ff00;
        }
        .crosshair.explosive {
            border: 2px solid #ff0000;
        }
        .crosshair.explosive::before, .crosshair.explosive::after {
            background: #ff0000;
        }
    </style>
</head>
<body>
    <!-- 开始界面 -->
    <div class="ui" id="startUI">
        <h1>Cryzon Agent (2D)</h1>
        <p>WASD 移动 | 鼠标控制瞄准 | 鼠标左键射击</p>
        <p>1-4 切换子弹类型 | 普通弹/霰弹/激光弹/爆炸弹</p>
        <p>R键装填弹药</p>
        <button onclick="startGame()">开始游戏</button>
    </div>

    <!-- 结束界面 -->
    <div class="ui" id="endUI" style="display: none;">
        <h1>游戏结束</h1>
        <p>最终得分: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">重新开始</button>
    </div>

    <!-- 计分板 & 子弹信息 -->
    <div class="hud" id="hud">
        得分: <span id="currentScore">0</span>
        <div class="ammo-info">
            当前子弹: <span id="bulletType" class="bullet-type">普通弹</span> | 
            弹药: <span id="currentAmmo">∞</span>
        </div>
    </div>

    <!-- 准星 -->
    <div class="crosshair" id="crosshair"></div>

    <!-- 2D游戏画布 -->
    <canvas id="gameCanvas"></canvas>

    <script>
        // ===================== 核心变量 =====================
        let canvas, ctx;
        let gameWidth, gameHeight;
        let lastTime = 0;
        let score = 0;
        let isGameRunning = false;

        // 玩家
        const player = {
            x: 0,
            y: 0,
            size: 20,
            speed: 5,
            color: '#00ffff'
        };

        // 鼠标位置（用于瞄准）
        const mouse = {
            x: 0,
            y: 0
        };

        // 子弹类型配置
        const BULLET_TYPES = {
            NORMAL: {
                id: 1,
                name: "普通弹",
                color: "#ffff00",
                speed: 10,
                size: 4,
                lifetime: 60, // 帧数
                ammo: -1, // -1 = 无限
                maxAmmo: -1
            },
            SHOTGUN: {
                id: 2,
                name: "霰弹",
                color: "#ff8800",
                speed: 8,
                size: 3,
                lifetime: 40,
                ammo: 8,
                maxAmmo: 8
            },
            LASER: {
                id: 3,
                name: "激光弹",
                color: "#00ff00",
                speed: 15,
                size: 2,
                lifetime: 80,
                ammo: -1,
                maxAmmo: -1
            },
            EXPLOSIVE: {
                id: 4,
                name: "爆炸弹",
                color: "#ff0000",
                speed: 7,
                size: 6,
                lifetime: 50,
                ammo: 5,
                maxAmmo: 5
            }
        };
        
        let currentBulletType = BULLET_TYPES.NORMAL;
        let bulletAmmo = {};
        
        // 游戏实体数组
        let bullets = [];
        let enemies = [];
        let particles = [];
        let stars = []; // 星空背景

        // 键盘输入
        const keys = {
            w: false, a: false, s: false, d: false,
            r: false
        };

        // ===================== 初始化 =====================
        function initGame() {
            // 获取画布和上下文
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            // 设置画布大小
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // 初始化玩家位置（屏幕中心）
            player.x = gameWidth / 2;
            player.y = gameHeight / 2;

            // 初始化弹药
            initAmmo();

            // 生成星空背景
            createStarField();

            // 绑定事件
            bindEvents();

            // 开始游戏循环
            requestAnimationFrame(gameLoop);
        }

        // 调整画布大小
        function resizeCanvas() {
            gameWidth = window.innerWidth;
            gameHeight = window.innerHeight;
            canvas.width = gameWidth;
            canvas.height = gameHeight;
        }

        // 初始化弹药
        function initAmmo() {
            bulletAmmo = {
                [BULLET_TYPES.NORMAL.id]: -1,
                [BULLET_TYPES.SHOTGUN.id]: BULLET_TYPES.SHOTGUN.maxAmmo,
                [BULLET_TYPES.LASER.id]: -1,
                [BULLET_TYPES.EXPLOSIVE.id]: BULLET_TYPES.EXPLOSIVE.maxAmmo
            };
            updateAmmoUI();
        }

        // 创建星空背景
        function createStarField() {
            stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * gameWidth,
                    y: Math.random() * gameHeight,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 0.2 + 0.1,
                    color: `rgba(${Math.floor(Math.random() * 100 + 155)}, ${Math.floor(Math.random() * 100 + 155)}, 255, ${Math.random() * 0.8 + 0.2})`
                });
            }
        }

        // 绑定事件
        function bindEvents() {
            // 键盘控制
            document.addEventListener('keydown', (e) => {
                if (!isGameRunning) return;
                
                switch(e.key.toLowerCase()) {
                    case 'w': keys.w = true; break;
                    case 'a': keys.a = true; break;
                    case 's': keys.s = true; break;
                    case 'd': keys.d = true; break;
                    case 'r': 
                        keys.r = true;
                        reloadAmmo();
                        break;
                    // 切换子弹
                    case '1': switchBulletType(1); break;
                    case '2': switchBulletType(2); break;
                    case '3': switchBulletType(3); break;
                    case '4': switchBulletType(4); break;
                }
            });

            document.addEventListener('keyup', (e) => {
                switch(e.key.toLowerCase()) {
                    case 'w': keys.w = false; break;
                    case 'a': keys.a = false; break;
                    case 's': keys.s = false; break;
                    case 'd': keys.d = false; break;
                    case 'r': keys.r = false; break;
                }
            });

            // 鼠标控制
            canvas.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });

            canvas.addEventListener('click', () => {
                if (isGameRunning) {
                    shootBullet();
                }
            });
        }

        // ===================== 游戏逻辑 =====================
        // 切换子弹类型
        function switchBulletType(typeId) {
            const newType = Object.values(BULLET_TYPES).find(t => t.id === typeId);
            if (newType) {
                currentBulletType = newType;
                // 更新准星样式
                const crosshair = document.getElementById('crosshair');
                crosshair.className = 'crosshair';
                if (newType.id === 2) crosshair.classList.add('shotgun');
                if (newType.id === 3) crosshair.classList.add('laser');
                if (newType.id === 4) crosshair.classList.add('explosive');
                // 更新UI
                document.getElementById('bulletType').textContent = newType.name;
                updateAmmoUI();
            }
        }

        // 更新弹药UI
        function updateAmmoUI() {
            const ammoText = bulletAmmo[currentBulletType.id] === -1 ? '∞' : bulletAmmo[currentBulletType.id];
            document.getElementById('currentAmmo').textContent = ammoText;
        }

        // 装填弹药
        function reloadAmmo() {
            if (currentBulletType.ammo === -1) return;
            if (bulletAmmo[currentBulletType.id] === currentBulletType.maxAmmo) return;
            
            bulletAmmo[currentBulletType.id] = currentBulletType.maxAmmo;
            updateAmmoUI();
        }

        // 发射子弹
        function shootBullet() {
            // 检查弹药
            if (bulletAmmo[currentBulletType.id] === 0) {
                reloadAmmo();
                return;
            }

            // 计算射击方向
            const dx = mouse.x - player.x;
            const dy = mouse.y - player.y;
            const angle = Math.atan2(dy, dx);

            // 根据子弹类型发射
            switch(currentBulletType.id) {
                case 1: // 普通弹
                    addBullet(player.x, player.y, angle, currentBulletType);
                    break;
                    
                case 2: // 霰弹（8发散射）
                    for (let i = -4; i <= 4; i++) {
                        if (i === 0) continue;
                        const spreadAngle = angle + (i * 0.05);
                        addBullet(player.x, player.y, spreadAngle, currentBulletType);
                    }
                    break;
                    
                case 3: // 激光弹
                    addBullet(player.x, player.y, angle, currentBulletType);
                    // 绘制激光束
                    addLaserBeam(player.x, player.y, mouse.x, mouse.y);
                    break;
                    
                case 4: // 爆炸弹
                    addBullet(player.x, player.y, angle, currentBulletType);
                    break;
            }

            // 消耗弹药
            if (currentBulletType.ammo !== -1) {
                bulletAmmo[currentBulletType.id]--;
                updateAmmoUI();
            }
        }

        // 添加子弹
        function addBullet(x, y, angle, type) {
            bullets.push({
                x: x,
                y: y,
                dx: Math.cos(angle) * type.speed,
                dy: Math.sin(angle) * type.speed,
                size: type.size,
                color: type.color,
                type: type.id,
                lifetime: type.lifetime,
                penetrate: type.id === 3, // 激光弹穿透
                explosive: type.id === 4 // 爆炸弹
            });
        }

        // 添加激光束
        function addLaserBeam(x1, y1, x2, y2) {
            particles.push({
                type: 'laser',
                x1: x1,
                y1: y1,
                x2: x2,
                y2: y2,
                color: '#00ff00',
                lifetime: 5
            });
        }

        // 添加爆炸粒子
        function addExplosion(x, y, isBig = false) {
            const particleCount = isBig ? 40 : 20;
            for (let i = 0; i < particleCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * (isBig ? 8 : 4) + 2;
                
                particles.push({
                    type: 'explosion',
                    x: x,
                    y: y,
                    dx: Math.cos(angle) * speed,
                    dy: Math.sin(angle) * speed,
                    size: Math.random() * (isBig ? 6 : 3) + 2,
                    color: `rgb(${255}, ${Math.floor(Math.random() * 155)}, 0)`,
                    lifetime: isBig ? 30 : 20,
                    alpha: 1
                });
            }
        }

        // 生成敌人
        function spawnEnemy() {
            if (!isGameRunning) return;
            
            // 随机生成在屏幕边缘
            const side = Math.floor(Math.random() * 4);
            let x, y;
            
            switch(side) {
                case 0: // 上
                    x = Math.random() * gameWidth;
                    y = -20;
                    break;
                case 1: // 右
                    x = gameWidth + 20;
                    y = Math.random() * gameHeight;
                    break;
                case 2: // 下
                    x = Math.random() * gameWidth;
                    y = gameHeight + 20;
                    break;
                case 3: // 左
                    x = -20;
                    y = Math.random() * gameHeight;
                    break;
            }

            enemies.push({
                x: x,
                y: y,
                size: 20,
                speed: Math.random() * 1.5 + 1,
                color: '#ff2222'
            });
        }

        // 更新玩家
        function updatePlayer() {
            // 移动玩家
            if (keys.w) player.y -= player.speed;
            if (keys.s) player.y += player.speed;
            if (keys.a) player.x -= player.speed;
            if (keys.d) player.x += player.speed;

            // 限制玩家在屏幕内
            player.x = Math.max(player.size/2, Math.min(gameWidth - player.size/2, player.x));
            player.y = Math.max(player.size/2, Math.min(gameHeight - player.size/2, player.y));
        }

        // 更新子弹
        function updateBullets() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                
                // 移动子弹
                bullet.x += bullet.dx;
                bullet.y += bullet.dy;
                
                // 减少生命周期
                bullet.lifetime--;

                // 检测子弹与敌人碰撞
                let hitEnemy = false;
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const enemy = enemies[j];
                    const dx = bullet.x - enemy.x;
                    const dy = bullet.y - enemy.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < (bullet.size + enemy.size) / 2) {
                        hitEnemy = true;

                        // 处理不同子弹效果
                        if (bullet.type === 1 || bullet.type === 2) {
                            // 普通弹/霰弹
                            addExplosion(enemy.x, enemy.y);
                            score += 10;
                            enemies.splice(j, 1);
                        } 
                        else if (bullet.type === 3) {
                            // 激光弹（穿透）
                            addExplosion(enemy.x, enemy.y);
                            score += 15;
                            enemies.splice(j, 1);
                            hitEnemy = false; // 穿透不消失
                        } 
                        else if (bullet.type === 4) {
                            // 爆炸弹（范围伤害）
                            addExplosion(enemy.x, enemy.y, true);
                            score += 20;
                            
                            // 爆炸范围内的敌人都消灭
                            for (let k = enemies.length - 1; k >= 0; k--) {
                                const e = enemies[k];
                                const edx = bullet.x - e.x;
                                const edy = bullet.y - e.y;
                                const edistance = Math.sqrt(edx * edx + edy * edy);
                                
                                if (edistance < 80) {
                                    enemies.splice(k, 1);
                                }
                            }
                        }

                        document.getElementById('currentScore').textContent = score;
                        break;
                    }
                }

                // 移除子弹（激光弹除外）
                if (hitEnemy && !bullet.penetrate) {
                    bullets.splice(i, 1);
                    continue;
                }

                // 生命周期结束或超出屏幕移除
                if (bullet.lifetime <= 0 || 
                    bullet.x < 0 || bullet.x > gameWidth || 
                    bullet.y < 0 || bullet.y > gameHeight) {
                    
                    // 爆炸弹超时爆炸
                    if (bullet.explosive) {
                        addExplosion(bullet.x, bullet.y, true);
                    }
                    
                    bullets.splice(i, 1);
                }
            }
        }

        // 更新敌人
        function updateEnemies() {
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                
                // 敌人向玩家移动
                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                const angle = Math.atan2(dy, dx);
                
                enemy.x += Math.cos(angle) * enemy.speed;
                enemy.y += Math.sin(angle) * enemy.speed;

                // 检测玩家与敌人碰撞（游戏结束）
                const pdx = player.x - enemy.x;
                const pdy = player.y - enemy.y;
                const distance = Math.sqrt(pdx * pdx + pdy * pdy);
                
                if (distance < (player.size + enemy.size) / 2) {
                    endGame();
                    break;
                }
            }
        }

        // 更新粒子
        function updateParticles() {
            // 更新星空
            for (let star of stars) {
                star.y += star.speed;
                if (star.y > gameHeight) {
                    star.y = -star.size;
                    star.x = Math.random() * gameWidth;
                }
            }

            // 更新特效粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.lifetime--;
                
                if (p.type === 'explosion') {
                    // 爆炸粒子
                    p.x += p.dx;
                    p.y += p.dy;
                    p.alpha = p.lifetime / 20;
                    p.size *= 0.95;
                } 
                else if (p.type === 'laser') {
                    // 激光束只需生命周期
                }

                if (p.lifetime <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        // ===================== 渲染 =====================
        function render() {
            // 清空画布
            ctx.clearRect(0, 0, gameWidth, gameHeight);

            // 绘制星空
            for (let star of stars) {
                ctx.fillStyle = star.color;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            }

            // 绘制玩家
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();

            // 绘制子弹
            for (let bullet of bullets) {
                ctx.fillStyle = bullet.color;
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, bullet.size, 0, Math.PI * 2);
                ctx.fill();
            }

            // 绘制敌人
            for (let enemy of enemies) {
                ctx.fillStyle = enemy.color;
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.size, 0, Math.PI * 2);
                ctx.fill();
                
                // 敌人描边
                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // 绘制粒子特效
            for (let p of particles) {
                if (p.type === 'explosion') {
                    ctx.fillStyle = `${p.color.slice(0, -1)}, ${p.alpha})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                } 
                else if (p.type === 'laser') {
                    ctx.strokeStyle = p.color;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(p.x1, p.y1);
                    ctx.lineTo(p.x2, p.y2);
                    ctx.stroke();
                }
            }
        }

        // ===================== 游戏状态管理 =====================
        function gameLoop(timestamp) {
            // 计算deltaTime（简单帧率控制）
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            if (isGameRunning) {
                // 每60帧生成一个敌人（约1秒）
                if (Math.floor(timestamp / 1000) % 1 === 0 && Math.random() > 0.7) {
                    spawnEnemy();
                }

                // 更新游戏逻辑
                updatePlayer();
                updateBullets();
                updateEnemies();
                updateParticles();
                
                // 渲染
                render();
            }

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            // 重置游戏状态
            score = 0;
            bullets = [];
            enemies = [];
            particles = [];
            isGameRunning = true;
            
            // 重置玩家位置
            player.x = gameWidth / 2;
            player.y = gameHeight / 2;

            // 初始化弹药
            initAmmo();
            switchBulletType(1);

            // 更新UI
            document.getElementById('currentScore').textContent = score;
            document.getElementById('startUI').style.display = 'none';
            document.getElementById('endUI').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            document.body.classList.add('cursor-hidden');

            // 初始化游戏（首次）
            if (!canvas) {
                initGame();
            }
        }

        function endGame() {
            isGameRunning = false;
            
            // 更新UI
            document.getElementById('finalScore').textContent = score;
            document.getElementById('endUI').style.display = 'block';
            document.getElementById('hud').style.display = 'none';
            document.getElementById('crosshair').style.display = 'none';
            document.body.classList.remove('cursor-hidden');
        }

        function restartGame() {
            startGame();
        }

        // 页面加载完成后初始化
        window.addEventListener('load', () => {
            // 初始化画布大小
            resizeCanvas();
        });
    </script>
</body>
</html>
