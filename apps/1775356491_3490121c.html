<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>八宝粥行动 - 黄泓皓作品</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #020617;
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: manipulation;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
            border: 2px solid #334155;
            cursor: crosshair;
        }
        .ui-panel {
            position: absolute;
            top: 25px;
            left: 25px;
            color: white;
            pointer-events: none;
            background: rgba(15, 23, 42, 0.8);
            padding: 18px;
            border-radius: 4px;
            border-left: 6px solid #10b981;
            backdrop-filter: blur(5px);
            z-index: 50;
        }
        /* Boss 血条样式 */
        #boss-ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            text-align: center;
            display: none;
            z-index: 60;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: white; z-index: 100;
            text-align: center;
            padding: 20px;
        }
        .game-title {
            font-family: 'ZCOOL KuaiLe', sans-serif;
            font-size: 6rem;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff 30%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(16, 185, 129, 0.5));
            margin-bottom: 0.5rem;
            letter-spacing: -2px;
        }
        .author-tag {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 2rem;
            letter-spacing: 4px;
            font-weight: 300;
        }
        .author-name {
            color: #10b981;
            font-weight: 700;
        }
        .content-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 12px;
            padding: 2rem;
            max-width: 600px;
            backdrop-filter: blur(10px);
        }
        .btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 16px 60px;
            font-size: 1.5rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            margin-top: 30px;
            pointer-events: auto;
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4);
        }
        .btn:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 20px 35px -10px rgba(16, 185, 129, 0.6);
            letter-spacing: 2px;
        }
        .hud-label { color: #94a3b8; font-size: 0.75rem; font-weight: bold; margin-bottom: 2px; }
        .hud-value { font-size: 1.6rem; font-weight: 900; margin-bottom: 12px; }
        
        .instruction-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
            text-align: left;
        }
        .key-tag {
            background: #334155;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            color: #10b981;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <!-- Boss UI -->
    <div id="boss-ui">
        <div class="text-red-500 font-bold mb-1 uppercase tracking-widest text-sm">监狱长 - 巨塔</div>
        <div class="w-full h-3 bg-black border border-red-900 rounded-full overflow-hidden">
            <div id="boss-hp-bar" class="h-full bg-red-600 shadow-[0_0_10px_#ef4444] transition-all" style="width: 100%"></div>
        </div>
    </div>

    <!-- 战斗 UI -->
    <div id="game-ui" class="ui-panel" style="display: none;">
        <div class="hud-label">当前区域 / LEVEL</div>
        <div id="level-display" class="hud-value text-green-400">1号大坝</div>
        
        <div class="hud-label">主公状态 / HP</div>
        <div class="w-56 h-4 bg-gray-900 border border-gray-700 mb-4 rounded-sm overflow-hidden">
            <div id="hp-bar" class="h-full bg-green-500 transition-all duration-300" style="width: 100%"></div>
        </div>
        
        <div class="flex gap-10">
            <div>
                <div class="hud-label">八宝粥供应</div>
                <div class="hud-value text-yellow-400"><span id="congee-count">0</span> / 6</div>
            </div>
            <div>
                <div class="hud-label">推进距离</div>
                <div class="hud-value text-blue-400"><span id="dist-count">0</span>m</div>
            </div>
        </div>
    </div>

    <!-- 首页 Landing Page -->
    <div id="start-screen" class="overlay">
        <h1 class="game-title">八宝粥行动</h1>
        <div class="author-tag">DESIGNED BY <span class="author-name">黄泓皓</span></div>
        
        <div id="screen-content" class="content-box">
            <h3 class="text-xl font-bold text-green-400 mb-2">游戏简介</h3>
            <p class="text-gray-300 text-sm leading-relaxed mb-6">
                在这个资源匮乏的世界，主公需要孤身穿过敌后的三个军事禁区。
                击败守卫，收集传说中的<span class="text-yellow-400 font-bold">八宝粥</span>维持生命。
                大坝、航空基地、以及最危险的<span class="text-orange-400">干燥监狱</span>，都挡不住主公视察的脚步！
            </p>
            
            <div class="h-px bg-white/10 mb-6"></div>
            
            <h3 class="text-xl font-bold text-green-400 mb-2">操作说明</h3>
            <div class="instruction-grid text-sm">
                <div>
                    <p class="mb-1">🚀 <span class="font-bold">移动控制</span></p>
                    <p class="text-gray-400">使用 <span class="key-tag">W</span> / <span class="key-tag">S</span> 或方向键</p>
                </div>
                <div>
                    <p class="mb-1">🔥 <span class="font-bold">武器开火</span></p>
                    <p class="text-gray-400">点击 <span class="key-tag">鼠标左键</span> 或 <span class="key-tag">空格</span></p>
                </div>
            </div>
        </div>
        
        <button id="main-btn" class="btn" onclick="startGame()">开始视察</button>
        <p class="mt-8 text-xs text-gray-500 uppercase tracking-widest">© 2024 黄泓皓工作室 | 轻松视察模式</p>
    </div>

    <!-- 结算页面 -->
    <div id="game-over" class="overlay" style="display: none; background: rgba(0,0,0,0.95);">
        <h2 class="text-6xl font-black mb-4" id="res-title">FAILED</h2>
        <p id="res-msg" class="text-xl mb-10 text-gray-400 px-12"></p>
        <div class="btn" onclick="location.reload()">回到首页</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const hpBar = document.getElementById('hp-bar');
    const congeeText = document.getElementById('congee-count');
    const distText = document.getElementById('dist-count');
    const levelDisplay = document.getElementById('level-display');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over');
    const gameUI = document.getElementById('game-ui');
    const bossUI = document.getElementById('boss-ui');
    const bossHpBar = document.getElementById('boss-hp-bar');
    const screenContent = document.getElementById('screen-content');
    const mainBtn = document.getElementById('main-btn');

    const W = 1100;
    const H = 600;
    canvas.width = W;
    canvas.height = H;

    let currentLevel = 1; 
    let gameState = 'MENU';
    let player, bullets, enemyBullets, enemies, items, particles, boss;
    let distance = 0;
    let bgOffset = 0;
    const keys = {};

    const LEVELS = {
        1: {
            name: "1号大坝",
            enemyRate: 0.01,
            targetDist: 3000,
            bgStyle: 'dam',
            enemyShootSpeed: 4,
            enemyShootRate: 2500,
            playerShootDelay: 150
        },
        2: {
            name: "航空基地",
            enemyRate: 0.02,
            targetDist: 4000, 
            bgStyle: 'airbase',
            enemyShootSpeed: 6, 
            enemyShootRate: 2000,
            playerShootDelay: 100
        },
        3: {
            name: "干燥监狱",
            enemyRate: 0.025,
            targetDist: 5000,
            bgStyle: 'prison',
            enemyShootSpeed: 7,
            enemyShootRate: 1800,
            playerShootDelay: 80
        }
    };

    function drawBackground() {
        const cfg = LEVELS[currentLevel];
        if (cfg.bgStyle === 'dam') {
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(0, 0, W, H);
            for (let i = 0; i < 6; i++) {
                let x = (i * 300 - bgOffset * 1.5) % (W + 300);
                if (x < -300) x += W + 300;
                ctx.fillStyle = '#334155';
                ctx.fillRect(x, 50, 100, H - 100);
                ctx.fillStyle = '#10b981';
                ctx.fillRect(x + 20, 20, 40, 30);
            }
        } else if (cfg.bgStyle === 'airbase') {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, W, H);
            ctx.strokeStyle = '#334155';
            ctx.beginPath();
            ctx.moveTo(0, H * 0.85); ctx.lineTo(W, H * 0.85);
            ctx.stroke();
            for (let i = 0; i < 4; i++) {
                let x = (i * 450 - bgOffset * 0.8) % (W + 450);
                if (x < -450) x += W + 450;
                ctx.fillStyle = '#1e293b';
                ctx.fillRect(x, H * 0.5, 150, H * 0.35);
            }
        } else if (cfg.bgStyle === 'prison') {
            ctx.fillStyle = '#451a03';
            ctx.fillRect(0, 0, W, H);
            for (let i = 0; i < 8; i++) {
                let x = (i * 200 - bgOffset * 2) % (W + 200);
                if (x < -200) x += W + 200;
                ctx.strokeStyle = '#78350f';
                ctx.lineWidth = 2;
                ctx.strokeRect(x, 50, 150, H - 150);
                ctx.fillStyle = '#1c1917';
                ctx.fillRect(x + 30, 80, 20, 40);
                ctx.fillRect(x + 100, 80, 20, 40);
            }
            ctx.fillStyle = 'rgba(251, 191, 36, 0.05)';
            for(let i=0; i<10; i++) {
                ctx.fillRect(Math.random()*W, Math.random()*H, 100, 2);
            }
        }
        
        const grd = ctx.createLinearGradient(0, 0, 0, 100);
        grd.addColorStop(0, "rgba(16, 185, 129, 0.2)");
        grd.addColorStop(1, "transparent");
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, W, 100);
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y; this.color = color;
            this.vx = (Math.random() - 0.5) * 10;
            this.vy = (Math.random() - 0.5) * 10;
            this.life = 1.0;
        }
        update() { this.x += this.vx; this.y += this.vy; this.life -= 0.05; }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, 4, 4);
            ctx.globalAlpha = 1;
        }
    }

    class Player {
        constructor() {
            this.w = 45; this.h = 65;
            this.x = 120; this.y = H/2;
            this.hp = 100;
            this.congee = 0;
            this.lastShot = 0;
        }
        update() {
            if ((keys['w'] || keys['arrowup']) && this.y > 80) this.y -= 8;
            if ((keys['s'] || keys['arrowdown']) && this.y < H - 120) this.y += 8;
        }
        draw() {
            ctx.fillStyle = '#10b981';
            ctx.fillRect(this.x - 10, this.y + 10, 15, 50);
            ctx.fillStyle = '#2563eb'; 
            ctx.fillRect(this.x, this.y, this.w, this.h);
            ctx.fillStyle = '#f8fafc'; 
            ctx.fillRect(this.x + 5, this.y - 15, 35, 25);
            ctx.fillStyle = '#fbbf24';
            ctx.fillRect(this.x + 25, this.y - 5, 12, 6);
            ctx.fillStyle = '#000';
            ctx.fillRect(this.x + 35, this.y + 25, 60, 14);
        }
        shoot() {
            const now = Date.now();
            const delay = LEVELS[currentLevel].playerShootDelay;
            if (now - this.lastShot > delay) {
                bullets.push({ x: this.x + 95, y: this.y + 28, vx: 22 });
                this.lastShot = now;
            }
        }
    }

    class Enemy {
        constructor() {
            this.w = 40; this.h = 60;
            this.x = W + 100;
            this.y = Math.random() * (H - 220) + 110;
            this.speed = 2 + Math.random() * 3;
            this.lastShot = 0;
        }
        update() {
            this.x -= this.speed;
            const now = Date.now();
            const cfg = LEVELS[currentLevel];
            if (now - this.lastShot > cfg.enemyShootRate) {
                enemyBullets.push({ x: this.x - 15, y: this.y + 25, vx: -cfg.enemyShootSpeed, vy: 0 });
                this.lastShot = now;
            }
        }
        draw() {
            ctx.fillStyle = (currentLevel === 3) ? '#fca5a1' : '#475569';
            ctx.fillRect(this.x, this.y, this.w, this.h);
            ctx.fillStyle = '#ef4444';
            ctx.fillRect(this.x + 5, this.y + 5, 8, 4);
            ctx.fillStyle = '#000';
            ctx.fillRect(this.x - 15, this.y + 25, 20, 6);
        }
    }

    class Boss {
        constructor() {
            this.w = 120; this.h = 200;
            this.x = W + 200;
            this.y = H/2 - 100;
            this.maxHp = 500;
            this.hp = 500;
            this.speedY = 2;
            this.lastShot = 0;
            this.active = false;
        }
        update() {
            if (this.x > W - 250) {
                this.x -= 2;
            } else {
                this.active = true;
                this.y += this.speedY;
                if (this.y < 80 || this.y > H - 280) this.speedY *= -1;
                
                const now = Date.now();
                if (now - this.lastShot > 1200) {
                    // 散弹攻击
                    for(let i = -2; i <= 2; i++) {
                        enemyBullets.push({ 
                            x: this.x - 10, 
                            y: this.y + 100, 
                            vx: -8, 
                            vy: i * 2 
                        });
                    }
                    this.lastShot = now;
                }
            }
        }
        draw() {
            // BOSS 主体
            ctx.fillStyle = '#1e1b4b';
            ctx.fillRect(this.x, this.y, this.w, this.h);
            // 装饰红色条纹
            ctx.fillStyle = '#b91c1c';
            ctx.fillRect(this.x, this.y + 20, this.w, 15);
            ctx.fillRect(this.x, this.y + 165, this.w, 15);
            // 发光核心
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#ef4444";
            ctx.fillStyle = '#f87171';
            ctx.beginPath();
            ctx.arc(this.x + 30, this.y + 100, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            // 武器口
            ctx.fillStyle = '#000';
            ctx.fillRect(this.x - 30, this.y + 85, 40, 30);
        }
    }

    class Congee {
        constructor() {
            this.x = W + 100;
            this.y = Math.random() * (H - 220) + 110;
            this.w = 35; this.h = 45;
        }
        update() { this.x -= 4; }
        draw() {
            ctx.fillStyle = '#fbbf24';
            ctx.fillRect(this.x, this.y, this.w, this.h);
            ctx.fillStyle = '#dc2626';
            ctx.fillRect(this.x, this.y + 12, this.w, 18);
            ctx.shadowBlur = 15; ctx.shadowColor = "yellow";
            ctx.strokeRect(this.x, this.y, this.w, this.h);
            ctx.shadowBlur = 0;
        }
    }

    function init(level = 1) {
        currentLevel = level;
        player = player || new Player();
        player.congee = 0;
        distance = 0;
        bullets = []; enemyBullets = []; enemies = []; items = []; particles = [];
        boss = null;
        bgOffset = 0;
        bossUI.style.display = 'none';
        levelDisplay.textContent = LEVELS[currentLevel].name;
    }

    function startGame() {
        init(1);
        gameState = 'PLAYING';
        startScreen.style.display = 'none';
        gameOverScreen.style.display = 'none';
        gameUI.style.display = 'block';
        requestAnimationFrame(gameLoop);
    }

    function gameLoop() {
        if (gameState !== 'PLAYING') return;
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function update() {
        const cfg = LEVELS[currentLevel];
        distance += 3;
        bgOffset += 5;
        distText.textContent = Math.floor(distance);
        congeeText.textContent = player.congee;
        hpBar.style.width = player.hp + '%';

        player.update();

        // 最终关卡 BOSS 登场判定
        if (currentLevel === 3 && distance > cfg.targetDist * 0.8 && !boss) {
            boss = new Boss();
            bossUI.style.display = 'block';
        }

        // 终点检查 (BOSS 关卡需要击败 BOSS)
        if (distance >= cfg.targetDist) {
            if (player.congee >= 6) {
                if (currentLevel < 3) {
                    gameState = 'INTERMISSION';
                    showIntermission(currentLevel + 1);
                } else if (!boss || boss.hp <= 0) {
                    endGame(true, "主公视察大获全胜！不仅击败了监狱长，还集齐了所有补给！");
                }
            } else {
                if (distance > cfg.targetDist + 100) endGame(false, `视察中断！八宝粥没带够(${player.congee}/6)。`);
            }
        }

        // 仅在非 BOSS 战或 BOSS 战初期生成小兵
        if (Math.random() < cfg.enemyRate && (!boss || !boss.active)) enemies.push(new Enemy());
        if (Math.random() < 0.015) items.push(new Congee());

        if (boss) {
            boss.update();
            bossHpBar.style.width = (boss.hp / boss.maxHp * 100) + '%';
            if (boss.hp <= 0) {
                spawnExplosion(boss.x + 60, boss.y + 100, '#ef4444');
                bossUI.style.display = 'none';
            }
        }

        bullets.forEach((b, i) => {
            b.x += b.vx;
            // 检查击中小兵
            enemies.forEach((e, ei) => {
                if (rectIntersect(b.x, b.y, 25, 6, e.x, e.y, e.w, e.h)) {
                    spawnExplosion(e.x + 20, e.y + 30, '#fff');
                    enemies.splice(ei, 1);
                    bullets.splice(i, 1);
                }
            });
            // 检查击中 BOSS
            if (boss && rectIntersect(b.x, b.y, 25, 6, boss.x, boss.y, boss.w, boss.h)) {
                boss.hp -= 10;
                spawnExplosion(b.x, b.y, '#f87171');
                bullets.splice(i, 1);
            }
            if (b.x > W) bullets.splice(i, 1);
        });

        enemyBullets.forEach((b, i) => {
            b.x += b.vx;
            b.y += (b.vy || 0);
            if (rectIntersect(b.x, b.y, 10, 4, player.x, player.y, player.w, player.h)) {
                player.hp -= 5;
                enemyBullets.splice(i, 1);
                spawnExplosion(player.x + 20, player.y + 30, '#ef4444');
            }
            if (b.x < -20) enemyBullets.splice(i, 1);
        });

        enemies.forEach((e, i) => {
            e.update();
            if (rectIntersect(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
                player.hp -= 10;
                enemies.splice(i, 1);
            }
            if (e.x < -50) enemies.splice(i, 1);
        });

        items.forEach((it, i) => {
            it.update();
            if (rectIntersect(player.x, player.y, player.w, player.h, it.x, it.y, it.w, it.h)) {
                player.congee++;
                player.hp = Math.min(100, player.hp + 35);
                items.splice(i, 1);
                spawnExplosion(it.x + 15, it.y + 20, '#fbbf24');
            }
        });

        particles.forEach((p, i) => {
            p.update();
            if (p.life <= 0) particles.splice(i, 1);
        });

        if (player.hp <= 0) endGame(false, "主公在最终视察中力竭了...");
    }

    function showIntermission(next) {
        gameState = 'MENU';
        gameUI.style.display = 'none';
        startScreen.style.display = 'flex';
        
        const nextName = LEVELS[next].name;
        let flavorText = next === 2 ? "大坝已平，航空基地正在颤抖。" : "警告：干燥监狱发现了巨大的生命反应，请主公务必小心！";

        screenContent.innerHTML = `
            <h1 class="game-title">视察进度更新</h1>
            <p class="text-xl mb-10 text-gray-300">即将前往：<span class="text-orange-500 font-bold">${nextName}</span></p>
            <div class="content-box mb-10">
                <p class="text-yellow-500 font-bold mb-2">情报摘要：</p>
                <p class="text-gray-300">${flavorText}</p>
            </div>
        `;
        mainBtn.textContent = "继续进军";
        mainBtn.onclick = () => {
            init(next);
            gameState = 'PLAYING';
            startScreen.style.display = 'none';
            gameUI.style.display = 'block';
            requestAnimationFrame(gameLoop);
        };
    }

    function draw() {
        drawBackground();
        particles.forEach(p => p.draw());
        ctx.fillStyle = '#fbbf24';
        bullets.forEach(b => {
            ctx.shadowBlur = 10; ctx.shadowColor = "#fbbf24";
            ctx.fillRect(b.x, b.y, 25, 6);
            ctx.shadowBlur = 0;
        });
        ctx.fillStyle = '#f87171';
        enemyBullets.forEach(b => ctx.fillRect(b.x, b.y, 10, 4));
        enemies.forEach(e => e.draw());
        if (boss && boss.hp > 0) boss.draw();
        items.forEach(it => it.draw());
        player.draw();
        
        if (distance > LEVELS[currentLevel].targetDist - 600 && (currentLevel < 3 || (boss && boss.hp <= 0))) {
            ctx.fillStyle = 'rgba(16, 185, 129, 0.3)';
            ctx.fillRect(W - 100, 80, 100, H - 160);
        }
    }

    function endGame(win, msg) {
        gameState = 'OVER';
        gameUI.style.display = 'none';
        bossUI.style.display = 'none';
        gameOverScreen.style.display = 'flex';
        document.getElementById('res-title').textContent = win ? "VICTORY" : "GAME OVER";
        document.getElementById('res-title').className = win ? "text-6xl font-black mb-4 text-green-500" : "text-6xl font-black mb-4 text-red-600";
        document.getElementById('res-msg').textContent = msg;
    }

    function rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) {
        return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
    }

    function spawnExplosion(x, y, color) {
        for(let i=0; i<15; i++) particles.push(new Particle(x, y, color));
    }

    window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
    window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
    canvas.onmousedown = () => { if(gameState === 'PLAYING') player.shoot(); };
    window.onkeypress = (e) => { if(e.key === ' ' && gameState === 'PLAYING') player.shoot(); };
</script>
</body>
</html>
