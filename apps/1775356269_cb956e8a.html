：<!DOCTYPE html>

<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>迷宫逃脱 - Maze Escape</title>

    <style>

        :root {

            --bg-color: #0f172a;

            --panel-color: #1e293b;

            --text-color: #f8fafc;

            --accent-color: #38bdf8;

            --danger-color: #ef4444;

            --success-color: #fbbf24;

            --dash-color: #10b981;

            --power-color: #fde047;

        }



        * {

            box-sizing: border-box;

            margin: 0;

            padding: 0;

            user-select: none;

            touch-action: none;

        }



        body {

            background-color: var(--bg-color);

            color: var(--text-color);

            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;

            display: flex;

            flex-direction: column;

            align-items: center;

            justify-content: flex-start;

            min-height: 100vh;

            overflow: hidden;

            padding-top: 10px;

        }



        #game-container {

            display: flex;

            flex-direction: column;

            align-items: center;

            width: 100%;

            max-width: 100vw;

        }



        /* UI Header */

        #ui-layer {

            width: 95%;

            background: var(--panel-color);

            padding: 10px 15px;

            border-radius: 12px;

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 10px;

            font-weight: bold;

            font-size: 0.85rem;

            border: 1px solid #334155;

            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);

        }



        .info-item {

            display: flex;

            flex-direction: column;

            align-items: center;

        }



        .info-label {

            font-size: 0.65rem;

            color: #94a3b8;

            text-transform: uppercase;

            margin-bottom: 2px;

        }



        #canvas-wrapper {

            position: relative;

            background: #000;

            border-radius: 8px;

            overflow: hidden;

            border: 2px solid #334155;

        }



        canvas {

            display: block;

            image-rendering: pixelated;

        }



        /* Overlay System */

        #overlay {

            position: absolute;

            inset: 0;

            background: rgba(15, 23, 42, 0.98);

            display: flex;

            flex-direction: column;

            align-items: center;

            justify-content: center;

            z-index: 20;

            text-align: center;

            padding: 25px;

        }



        .hidden { display: none !important; }



        h1 { font-size: 2.2rem; margin-bottom: 15px; color: var(--accent-color); letter-spacing: 2px; }

       

        .intro-box {

            background: rgba(56, 189, 248, 0.05);

            border-left: 4px solid var(--accent-color);

            padding: 15px;

            margin-bottom: 25px;

            max-width: 400px;

            text-align: left;

        }



        .intro-text {

            font-size: 0.95rem;

            line-height: 1.6;

            color: #cbd5e1;

        }



        button {

            background: var(--accent-color);

            color: #000;

            border: none;

            padding: 14px 40px;

            border-radius: 8px;

            font-size: 1.2rem;

            font-weight: bold;

            cursor: pointer;

            box-shadow: 0 4px 0 #0284c7;

            transition: transform 0.1s;

        }



        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #0284c7; }



        #mute-btn {

            background: transparent;

            box-shadow: none;

            padding: 2px;

            color: #94a3b8;

            font-size: 1.2rem;

        }



        /* Energy Bar */

        #energy-bar-container {

            width: 70px;

            height: 8px;

            background: #0f172a;

            border-radius: 4px;

            overflow: hidden;

            margin-top: 3px;

            border: 1px solid #334155;

        }

        #energy-bar {

            width: 100%;

            height: 100%;

            background: var(--dash-color);

            transition: width 0.1s linear;

        }



        /* Fog layer */

        #fog-layer {

            position: absolute;

            inset: 0;

            pointer-events: none;

            display: none;

            z-index: 10;

        }



        /* Mobile Controls */

        #mobile-joy {

            margin-top: 15px;

            display: none;

            justify-content: center;

            gap: 20px;

        }



        @media (max-width: 600px) {

            #mobile-joy { display: flex; }

        }



        .joy-btn {

            width: 50px;

            height: 50px;

            background: var(--panel-color);

            border: 2px solid var(--accent-color);

            border-radius: 12px;

            display: flex;

            align-items: center;

            justify-content: center;

            color: var(--accent-color);

            font-size: 1.2rem;

        }



        #btn-dash {

            width: 75px;

            background: var(--dash-color);

            border-color: #065f46;

            color: white;

            font-size: 0.8rem;

            font-weight: bold;

        }

    </style>

</head>

<body>



    <div id="game-container">

        <div id="ui-layer">

            <div class="info-item">

                <span class="info-label">音效</span>

                <button id="mute-btn">🔊</button>

            </div>

            <div class="info-item">

                <span class="info-label">关卡</span>

                <span id="level-name">准备</span>

            </div>

            <div class="info-item">

                <span class="info-label" id="energy-label">冲刺能量</span>

                <div id="energy-bar-container"><div id="energy-bar"></div></div>

            </div>

            <div class="info-item">

                <span class="info-label">分数</span>

                <span id="score-val" style="color: var(--success-color)">0</span>

            </div>

            <div class="info-item">

                <span class="info-label">状态</span>

                <span id="timer-text">等待</span>

            </div>

        </div>



        <div id="canvas-wrapper">

            <div id="fog-layer"></div>

            <canvas id="gameCanvas"></canvas>



            <div id="overlay">

                <h1 id="msg-title">迷宫逃脱</h1>

                <div class="intro-box">

                    <p id="msg-body" class="intro-text">

                        在动态迷宫中寻找金色出口。使用 <b>WASD</b> 灵活移动，按 <b>空格</b> 瞬移冲刺。吃掉绿色能量豆开启超级模式，即可反击并“吃掉”猎人赚取高分！

                    </p>

                </div>

                <button id="start-btn">开始挑战</button>

            </div>

        </div>



        <div id="mobile-joy">

            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">

                <div></div><div class="joy-btn" id="btn-up">▲</div><div></div>

                <div class="joy-btn" id="btn-left">◀</div><div class="joy-btn" id="btn-down">▼</div><div class="joy-btn" id="btn-right">▶</div>

            </div>

            <div style="display: flex; align-items: center;">

                <div class="joy-btn" id="btn-dash">DASH</div>

            </div>

        </div>

    </div>



    <script>

        /**

         * Audio Engine

         */

        const AudioEngine = {

            ctx: null,

            isMuted: false,

            init() {

                if (!this.ctx) {

                    try {

                        this.ctx = new (window.AudioContext || window.webkitAudioContext)();

                    } catch(e) { console.error("Web Audio not supported"); }

                }

            },

            play(type) {

                if (this.isMuted || !this.ctx || this.ctx.state === 'suspended') return;

                const now = this.ctx.currentTime;

                const createOsc = (freq, type = 'sine', dur = 0.1, gainVal = 0.1) => {

                    const o = this.ctx.createOscillator();

                    const g = this.ctx.createGain();

                    o.type = type; o.frequency.setValueAtTime(freq, now);

                    g.gain.setValueAtTime(gainVal, now);

                    g.gain.exponentialRampToValueAtTime(0.01, now + dur);

                    o.connect(g); g.connect(this.ctx.destination);

                    o.start(); o.stop(now + dur);

                };



                switch(type) {

                    case 'step': createOsc(440, 'triangle', 0.05, 0.02); break;

                    case 'dash': createOsc(900, 'sine', 0.2, 0.08); break;

                    case 'power': createOsc(880, 'square', 0.4, 0.08); break;

                    case 'eat': createOsc(150, 'sawtooth', 0.15, 0.1); break;

                    case 'tick': createOsc(1200, 'sine', 0.02, 0.03); break;

                    case 'alert': createOsc(200, 'sawtooth', 0.5, 0.1); break;

                    case 'win': [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => createOsc(f, 'sine', 0.4, 0.1), i * 100)); break;

                    case 'lose': createOsc(100, 'square', 1.0, 0.1); break;

                }

            }

        };



        /**

         * Game Constants & Variables

         */

        const canvas = document.getElementById('gameCanvas');

        const ctx = canvas.getContext('2d');

        const fogLayer = document.getElementById('fog-layer');

        const overlay = document.getElementById('overlay');

        const startBtn = document.getElementById('start-btn');

        const scoreDisplay = document.getElementById('score-val');

        const levelNameDisplay = document.getElementById('level-name');

        const timerText = document.getElementById('timer-text');

        const muteBtn = document.getElementById('mute-btn');

        const energyBar = document.getElementById('energy-bar');

        const energyLabel = document.getElementById('energy-label');

        const msgBody = document.getElementById('msg-body');



        const GRID_W = 31, GRID_H = 31;

        const getCellSize = () => {

            const maxW = window.innerWidth * 0.95;

            const maxH = window.innerHeight - 250;

            return Math.floor(Math.min(maxW / GRID_W, maxH / GRID_H, 18));

        };

       

        let CELL_SIZE = getCellSize();

        canvas.width = GRID_W * CELL_SIZE;

        canvas.height = GRID_H * CELL_SIZE;



        let maze = [], hunters = [], player = { x: 1, y: 1 };

        let powerPellets = [];

        let entrance = { x: 1, y: 1 }, exit = { x: GRID_W - 2, y: GRID_H - 2 };

        let score = 0, level = 1, gameActive = false, gracePeriod = true, graceTimer = 0, gameTick = 0;



        const PLAYER_MOVE_SPEED = 3;

        let playerMoveTick = 0;

        const keys = {};

        let dashCooldown = 0;

        const MAX_DASH_CD = 120;

        let powerTimer = 0;



        const LEVELS = {

            1: { name: "静谧深渊", hunters: 1, speed: 22, grace: 15, dynamic: false, fog: false },

            2: { name: "影之追踪", hunters: 3, speed: 12, grace: 12, dynamic: false, fog: false },

            3: { name: "迷雾幻境", hunters: 4, speed: 8, grace: 10, dynamic: true, fog: true }

        };



        /**

         * Maze Generation (DFS)

         */

        function generateMaze() {

            maze = Array(GRID_H).fill().map(() => Array(GRID_W).fill(1));

            const stack = [[1, 1]];

            maze[1][1] = 0;

            while (stack.length > 0) {

                const [cx, cy] = stack[stack.length - 1];

                const dirs = [[0, 2], [0, -2], [2, 0], [-2, 0]].sort(() => Math.random() - 0.5);

                let found = false;

                for (let [dx, dy] of dirs) {

                    const nx = cx + dx, ny = cy + dy;

                    if (nx > 0 && nx < GRID_W - 1 && ny > 0 && ny < GRID_H - 1 && maze[ny][nx] === 1) {

                        maze[ny][nx] = 0; maze[cy + dy / 2][cx + dx / 2] = 0;

                        stack.push([nx, ny]); found = true; break;

                    }

                }

                if (!found) stack.pop();

            }

            maze[exit.y][exit.x] = 0;

           

            // Randomly open some walls and place power pellets

            powerPellets = [];

            for(let i=0; i<60; i++) {

                let rx = Math.floor(Math.random()*(GRID_W-2))+1, ry = Math.floor(Math.random()*(GRID_H-2))+1;

                if(maze[ry][rx] === 1) maze[ry][rx] = 0;

                if(i < 3 && maze[ry][rx] === 0) powerPellets.push({x: rx, y: ry});

            }

        }



        /**

         * Pathfinding for Hunters (BFS)

         */

        function getNextHunterMove(hx, hy, tx, ty) {

            const queue = [[hx, hy, []]], visited = new Set([`${hx},${hy}`]);

            while (queue.length > 0) {

                const [cx, cy, path] = queue.shift();

                if (cx === tx && cy === ty) return path[0];

                const dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]];

                for (let [dx, dy] of dirs) {

                    const nx = cx + dx, ny = cy + dy;

                    if (nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H && maze[ny][nx] === 0 && !visited.has(`${nx},${ny}`)) {

                        visited.add(`${nx},${ny}`); queue.push([nx, ny, [...path, { x: nx, y: ny }]]);

                    }

                }

                if(queue.length > 1500) break;

            }

            return { x: hx, y: hy };

        }



        /**

         * Core Game State Functions

         */

        function initGame(targetLevel = 1) {

            level = targetLevel;

            const config = LEVELS[level];

            CELL_SIZE = getCellSize();

            canvas.width = GRID_W * CELL_SIZE; canvas.height = GRID_H * CELL_SIZE;

            generateMaze();

            player = { ...entrance };

            hunters = [];

            for (let i = 0; i < config.hunters; i++) hunters.push({ x: exit.x, y: exit.y });

            gracePeriod = true; graceTimer = config.grace;

            levelNameDisplay.innerText = config.name;

            timerText.innerText = `${graceTimer}s`;

            timerText.style.color = "#38bdf8";

            fogLayer.style.display = config.fog ? 'block' : 'none';

            dashCooldown = 0; powerTimer = 0;

            if (!gameActive) { gameActive = true; gameLoop(); }

        }



        function checkCollisions() {

            if (gracePeriod) return;

           

            // Collect power pellets

            powerPellets = powerPellets.filter(p => {

                if (p.x === player.x && p.y === player.y) {

                    powerTimer = 300; // 5s

                    AudioEngine.play('power');

                    score += 150;

                    return false;

                }

                return true;

            });



            // Hunter collision

            for (let h of hunters) {

                if (h.x === player.x && h.y === player.y) {

                    if (powerTimer > 0) {

                        h.x = exit.x; h.y = exit.y;

                        score += 300;

                        AudioEngine.play('eat');

                    } else {

                        gameOver();

                        return true;

                    }

                }

            }

            return false;

        }



        function draw() {

            ctx.clearRect(0, 0, canvas.width, canvas.height);

           

            // Walls

            ctx.fillStyle = '#1e293b'; ctx.strokeStyle = '#334155'; ctx.lineWidth = 1;

            for (let y = 0; y < GRID_H; y++) {

                for (let x = 0; x < GRID_W; x++) {

                    if (maze[y][x] === 1) {

                        ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);

                        ctx.strokeRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);

                    }

                }

            }



            // Power Pellets

            powerPellets.forEach(p => {

                ctx.fillStyle = '#10b981';

                ctx.beginPath(); ctx.arc(p.x * CELL_SIZE + CELL_SIZE/2, p.y * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/4, 0, Math.PI * 2); ctx.fill();

            });



            // Exit (Gold)

            ctx.fillStyle = '#fbbf24'; ctx.shadowBlur = 10; ctx.shadowColor = '#fbbf24';

            ctx.fillRect(exit.x * CELL_SIZE + 2, exit.y * CELL_SIZE + 2, CELL_SIZE - 4, CELL_SIZE - 4);

            ctx.shadowBlur = 0;



            // Hunters

            hunters.forEach(h => {

                ctx.fillStyle = gracePeriod ? '#475569' : (powerTimer > 0 ? '#38bdf8' : '#ef4444');

                ctx.beginPath(); ctx.arc(h.x * CELL_SIZE + CELL_SIZE/2, h.y * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/2.2, 0, Math.PI * 2); ctx.fill();

            });



            // Player

            ctx.fillStyle = powerTimer > 0 ? '#fbbf24' : '#f8fafc';

            if (powerTimer > 0) { ctx.shadowBlur = 15; ctx.shadowColor = '#fbbf24'; }

            ctx.beginPath(); ctx.arc(player.x * CELL_SIZE + CELL_SIZE/2, player.y * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/2.5, 0, Math.PI * 2); ctx.fill();

            ctx.shadowBlur = 0;

            ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 2; ctx.stroke();



            // Fog effect

            if (LEVELS[level].fog) {

                const px = player.x * CELL_SIZE + CELL_SIZE/2, py = player.y * CELL_SIZE + CELL_SIZE/2;

                const radius = CELL_SIZE * (powerTimer > 0 ? 10 : 6);

                fogLayer.style.background = `radial-gradient(circle ${radius}px at ${px}px ${py}px, transparent 15%, rgba(0,0,0,0.99) 90%)`;

            }

        }



        function handleInput() {

            playerMoveTick++;

            let dx = 0, dy = 0;

            if (keys['w'] || keys['arrowup']) dy -= 1;

            if (keys['s'] || keys['arrowdown']) dy += 1;

            if (keys['a'] || keys['arrowleft']) dx -= 1;

            if (keys['d'] || keys['arrowright']) dx += 1;



            const moveDelay = powerTimer > 0 ? 2 : PLAYER_MOVE_SPEED;

            if ((dx !== 0 || dy !== 0) && playerMoveTick >= moveDelay) {

                movePlayer(dx, dy);

                playerMoveTick = 0;

            }



            if ((keys[' '] || keys['shift']) && dashCooldown <= 0 && (dx !== 0 || dy !== 0)) {

                performDash(dx, dy);

            }

        }



        function performDash(dx, dy) {

            const dashDist = 3;

            let finalX = player.x, finalY = player.y;

            for(let i = 1; i <= dashDist; i++) {

                let tx = player.x + dx * i, ty = player.y + dy * i;

                if(tx >= 0 && tx < GRID_W && ty >= 0 && ty < GRID_H && maze[ty][tx] === 0) {

                    finalX = tx; finalY = ty;

                } else break;

            }

            if(finalX !== player.x || finalY !== player.y) {

                player.x = finalX; player.y = finalY;

                dashCooldown = MAX_DASH_CD;

                AudioEngine.play('dash');

                if (checkCollisions()) return;

                if (player.x === exit.x && player.y === exit.y) winLevel();

            }

        }



        function gameLoop() {

            if (!gameActive) return;

            gameTick++;

            handleInput();

           

            // Skill UI update

            if (powerTimer > 0) {

                powerTimer--;

                energyBar.style.width = (powerTimer / 300 * 100) + '%';

                energyBar.style.backgroundColor = 'var(--power-color)';

                energyLabel.innerText = '超级模式!';

            } else {

                if (dashCooldown > 0) dashCooldown--;

                energyBar.style.width = ((MAX_DASH_CD - dashCooldown) / MAX_DASH_CD * 100) + '%';

                energyBar.style.backgroundColor = 'var(--dash-color)';

                energyLabel.innerText = '冲刺能量';

            }



            if (gameTick % 10 === 0) { score += level; scoreDisplay.innerText = score; }

           

            if (gracePeriod && gameTick % 60 === 0) {

                graceTimer--;

                if (graceTimer <= 0) {

                    gracePeriod = false; timerText.innerText = "逃!"; timerText.style.color = "#ef4444"; AudioEngine.play('alert');

                } else {

                    timerText.innerText = `${graceTimer}s`;

                    if (graceTimer <= 5) AudioEngine.play('tick');

                }

            }

           

            const config = LEVELS[level];

            if (!gracePeriod && gameTick % config.speed === 0) {

                hunters.forEach(h => {

                    const next = getNextHunterMove(h.x, h.y, player.x, player.y);

                    h.x = next.x; h.y = next.y;

                });

                checkCollisions();

            }

            if (config.dynamic && gameTick % 120 === 0) shuffleMaze();

            draw(); requestAnimationFrame(gameLoop);

        }



        function shuffleMaze() {

            for (let i = 0; i < 5; i++) {

                let rx = Math.floor(Math.random()*(GRID_W-2))+1, ry = Math.floor(Math.random()*(GRID_H-2))+1;

                const isCritical = (rx === player.x && ry === player.y) || (rx === exit.x && ry === exit.y);

                if (!isCritical) maze[ry][rx] = maze[ry][rx] === 1 ? 0 : 1;

            }

        }



        function movePlayer(dx, dy) {

            if (!gameActive) return;

            const nx = player.x + dx, ny = player.y + dy;

            if (nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H && maze[ny][nx] === 0) {

                player.x = nx; player.y = ny;

                AudioEngine.play('step');

                if (checkCollisions()) return;

                if (player.x === exit.x && player.y === exit.y) winLevel();

            }

        }



        function winLevel() {

            gameActive = false; AudioEngine.play('win');

            if (level < 3) {

                document.getElementById('msg-title').innerText = "顺利突围！";

                msgBody.innerHTML = `恭喜逃离了 ${LEVELS[level].name}<br>猎人们正聚集在下一关，准备好了吗？`;

                startBtn.innerText = "挑战下一关";

                startBtn.onclick = () => { overlay.classList.add('hidden'); initGame(level + 1); };

            } else {

                document.getElementById('msg-title').innerText = "迷宫传奇！";

                msgBody.innerHTML = `你征服了幻境迷宫！<br>最终传奇得分：<b>${score}</b>`;

                startBtn.innerText = "再次挑战"; startBtn.onclick = () => location.reload();

            }

            overlay.classList.remove('hidden');

        }



        function gameOver() {

            gameActive = false; AudioEngine.play('lose');

            document.getElementById('msg-title').innerText = "挑战失败";

            msgBody.innerHTML = `<div style="font-size: 1.2rem; margin-bottom: 15px; color: var(--success-color);">得分: ${score}</div>你在 ${LEVELS[level].name} 被猎人拦截。多利用<b>能量豆</b>和<b>冲刺</b>来躲避追捕！`;

            startBtn.innerText = "重整旗鼓"; startBtn.onclick = () => location.reload();

            overlay.classList.remove('hidden');

        }



        /**

         * Event Listeners

         */

        window.addEventListener('keydown', e => {

            keys[e.key.toLowerCase()] = true;

            if (gameActive) {

                const k = e.key.toLowerCase();

                if (['w','s','a','d','arrowup','arrowdown','arrowleft','arrowright'].includes(k)) playerMoveTick = PLAYER_MOVE_SPEED;

            }

        });

        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);



        const setupMobile = (id, key) => {

            const el = document.getElementById(id);

            el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });

            el.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });

        };

        setupMobile('btn-up', 'w'); setupMobile('btn-down', 's');

        setupMobile('btn-left', 'a'); setupMobile('btn-right', 'd');

        setupMobile('btn-dash', ' ');



        startBtn.onclick = () => {

            AudioEngine.init();

            overlay.classList.add('hidden');

            initGame(1);

        };

       

        muteBtn.onclick = () => {

            AudioEngine.isMuted = !AudioEngine.isMuted;

            muteBtn.innerText = AudioEngine.isMuted ? '❌' : '🔊';

        };



        draw();

        window.addEventListener('resize', () => {

            CELL_SIZE = getCellSize(); canvas.width = GRID_W * CELL_SIZE; canvas.height = GRID_H * CELL_SIZE; draw();

        });

    </script>

</body>

</html>
