<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>土豆地雷</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei"}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#111}
#game{position:relative;width:950px;height:700px;background:#1a1a1a;border-radius:12px;overflow:hidden}

@keyframes shake{
0%,100%{transform:translate(0,0)}25%{transform:translate(-4px,4px)}50%{transform:translate(4px,-4px)}75%{transform:translate(-4px,-4px)}}
.shake{animation:shake 0.3s}

#menu{position:absolute;width:100%;height:100%;background:linear-gradient(135deg,#111,#222);
display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;color:#fff;text-align:center}

#menu h1{font-size:60px;color:#ffcc00;margin-bottom:10px}

.intro{margin:10px 0;font-size:20px;line-height:1.6}
.intro .red{color:#f33}
.intro .brown{color:#633}
.intro .yellow{color:#fc3}
.intro .purple{color:#90f}

#startBtn{padding:16px 40px;font-size:26px;background:#0f5;border:none;border-radius:10px;cursor:pointer;margin-top:10px}
#startBtn:hover{transform:scale(1.1)}

#player{position:absolute;width:50px;height:50px;background:#0f5;border-radius:10px;
box-shadow:0 0 20px #0f5;z-index:10;display:none}

#player.hurt{animation:hurt 0.3s;background:red}
@keyframes hurt{0%,100%{opacity:1}50%{opacity:0.4}}

.enemy{position:absolute;z-index:4}
.enemy-normal{background:#f33;width:50px;height:50px;border-radius:8px;box-shadow:0 0 15px #f33}
.enemy-tank{background:#633;width:60px;height:60px;border-radius:8px;box-shadow:0 0 18px #633}
.enemy-fast{background:#fc3;width:40px;height:40px;border-radius:50%;box-shadow:0 0 15px #fc3}
.enemy-boss{background:#90f;width:70px;height:70px;border-radius:12px;box-shadow:0 0 25px #90f}

.mine{position:absolute;width:32px;height:32px;background:#ff0;border-radius:50%;
box-shadow:0 0 15px #ff0;animation:pulse 0.8s infinite alternate}
@keyframes pulse{0%{transform:scale(1)}100%{transform:scale(1.15)}}

.explode{position:absolute;width:140px;height:140px;
background:radial-gradient(circle,#ff0,#f80,#f00);border-radius:50%;animation:exp 0.6s forwards;z-index:100}
@keyframes exp{0%{transform:scale(0);opacity:1}50%{transform:scale(1.3);opacity:0.9}100%{transform:scale(0);opacity:0}}

.fragment{position:absolute;width:7px;height:7px;background:#ff0;animation:fly 0.5s forwards}
@keyframes fly{0%{opacity:1}100%{opacity:0}}

.ui{position:absolute;top:15px;left:20px;color:#fff;font-size:24px;background:rgba(0,0,0,0.6);
padding:10px 14px;border-radius:10px;z-index:99;display:none}

#levelPopup{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
font-size:120px;
font-weight:900;
color:#fff;
text-shadow:0 0 20px #ff0, 0 0 40px #f80;
z-index:9999;
opacity:0;
transition:all 0.5s ease;
}
#levelPopup.show{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

.end{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);
font-size:60px;font-weight:bold;z-index:999;display:none}

#restartBtn{position:absolute;top:70%;left:50%;transform:translate(-50%,-50%);
padding:15px 35px;font-size:24px;background:#f90;border:none;border-radius:10px;cursor:pointer;z-index:999;display:none}
</style>
</head>
<body>
<div id="game">
<div id="menu">
<h1>土豆地雷</h1>
<div class="intro">
红色敌人：普通士兵，速度正常<br>
<span class="brown">棕色敌人：重型士兵，血量多，速度较慢</span><br>
<span class="yellow">黄色敌人：敏捷士兵，速度较快</span><br>
<span class="purple">紫色敌人：精英敌人，攻击高，血量较多</span><br>
<br>
操作：方向键移动，空格键放地雷，每关血量增加
</div>
<button id="startBtn">开始游戏</button>
</div>

<div id="levelPopup"></div>
<button id="restartBtn">重新开始</button>
<div class="end" id="gameOver" style="color:red">游戏失败</div>
<div class="end" id="winGame" style="color:#0f5">通关成功</div>

<div class="ui">
分数：<span id="score">0</span> 血量：<span id="hp">5</span> 关卡：<span id="level">1</span><br>
称号：<span id="title" style="font-size:28px; color:#ff0; font-weight:bold">新兵</span>
</div>

<div id="player"></div>
</div>

<script>
const bgm = new Audio("https://www.bensound.com/bensound-music/bensound-groovyhiphop.mp3");
bgm.loop=true;bgm.volume=0.4;
const explodeSnd=new Audio("https://cdn.freesound.org/previews/132/132215_1888911-lq.mp3");
const placeSnd=new Audio("https://cdn.freesound.org/previews/669/669552_11983669-lq.mp3");
const hitSnd=new Audio("https://cdn.freesound.org/previews/365/365008_6965258-lq.mp3");
const levelSnd=new Audio("https://cdn.freesound.org/previews/176/176513_3318381-lq.mp3");

const GW=950,GH=700,WIN_SCORE=60;
const game=document.getElementById("game");
const player=document.getElementById("player");
const scoreEl=document.getElementById("score");
const hpEl=document.getElementById("hp");
const levelEl=document.getElementById("level");
const titleEl=document.getElementById("title");
const levelPopup=document.getElementById("levelPopup");
const startBtn=document.getElementById("startBtn");
const restartBtn=document.getElementById("restartBtn");
const gameOver=document.getElementById("gameOver");
const winGame=document.getElementById("winGame");

let started=false,ended=false,canPlace=true;
let p={x:GW/2-25,y:GH/2-25,speed:5,hp:5,max:5,score:0,level:1};
let keys={ArrowUp:false,ArrowDown:false,ArrowLeft:false,ArrowRight:false};

function spawnEnemy(){
  const r=Math.random();
  const e=document.createElement("div");
  e.classList.add("enemy");

  if(r<0.5){
    e.classList.add("enemy-normal");
    e.speed=1.4;
    e.atk=1;
  }else if(r<0.75){
    e.classList.add("enemy-tank");
    e.speed=0.8;
    e.atk=2;
  }else if(r<0.9){
    e.classList.add("enemy-fast");
    e.speed=2.8;
    e.atk=1;
  }else{
    e.classList.add("enemy-boss");
    e.speed=1.1;
    e.atk=3;
  }

  e.style.left=Math.random()*(GW-70)+"px";
  e.style.top=Math.random()*(GH/2)+"px";
  game.appendChild(e);
}

function startGame(){
  document.getElementById("menu").style.display="none";
  player.style.display="block";
  document.querySelector(".ui").style.display="block";
  bgm.play();
  started=true;
  nextLevel();
  loop();
}

function nextLevel(){
  document.querySelectorAll(".enemy").forEach(e=>e.remove());
  p.max=5+p.level-1;
  if(p.max>10)p.max=10;
  p.hp=p.max;

  let count=4+p.level*2;
  for(let i=0;i<count;i++)spawnEnemy();
}

function placeMine(){
  if(!canPlace||ended)return;
  canPlace=false;
  placeSnd.play();

  const m=document.createElement("div");
  m.className="mine";
  m.style.left=p.x+9+"px";
  m.style.top=p.y+9+"px";
  game.appendChild(m);

  setTimeout(()=>{
    const x=m.offsetLeft+16;
    const y=m.offsetTop+16;
    m.remove();
    boom(x,y);
    explodeSnd.play();
    doExplode(x,y);
  },1000);

  setTimeout(()=>{canPlace=true;},700);
}

function boom(x,y){
  const b=document.createElement("div");
  b.className="explode";
  b.style.left=x-70+"px";
  b.style.top=y-70+"px";
  game.appendChild(b);
  setTimeout(()=>b.remove(),600);
}

function doExplode(x,y){
  document.querySelectorAll(".enemy").forEach(e=>{
    const ex=e.offsetLeft+e.offsetWidth/2;
    const ey=e.offsetTop+e.offsetHeight/2;
    const d=Math.hypot(x-ex,y-ey);
    if(d<90){
      e.remove();
      p.score++;
      spawnEnemy();
      checkLevel();
    }
  });
  shake();
}

function moveEnemies(){
  document.querySelectorAll(".enemy").forEach(e=>{
    const ex=e.offsetLeft+e.offsetWidth/2;
    const ey=e.offsetTop+e.offsetHeight/2;
    const px=p.x+25;
    const py=p.y+25;
    const dx=px-ex;
    const dy=py-ey;
    const dist=Math.hypot(dx,dy);
    if(dist>1){
      e.style.left = e.offsetLeft + (dx/dist)*e.speed + "px";
      e.style.top = e.offsetTop + (dy/dist)*e.speed + "px";
    }
  });
}

function movePlayer(){
  if(ended)return;
  if(keys.ArrowLeft && p.x>0) p.x-=p.speed;
  if(keys.ArrowRight && p.x<GW-50) p.x+=p.speed;
  if(keys.ArrowUp && p.y>0) p.y-=p.speed;
  if(keys.ArrowDown && p.y<GH-50) p.y+=p.speed;
  player.style.left=p.x+"px";
  player.style.top=p.y+"px";
}

function checkPlayerHurt(){
  if(ended)return;
  document.querySelectorAll(".enemy").forEach(e=>{
    const a=player.getBoundingClientRect();
    const b=e.getBoundingClientRect();
    if(a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top){
      p.hp -= e.atk;
      hitSnd.play();
      shake();
      player.classList.add("hurt");
      setTimeout(()=>player.classList.remove("hurt"),250);
      e.remove();
      spawnEnemy();
      if(p.hp<=0) gameOverFun();
    }
  });
}

function checkLevel(){
  if(p.score >= p.level*8){
    p.level++;
    nextLevel();
    showPopup("第"+p.level+"关");
    levelSnd.play();
  }
}

function updateTitle(){
  let title, color;
  if(p.score<10){ title="新兵"; color="#ff0"; }
  else if(p.score<25){ title="尖兵"; color="#0ff"; }
  else if(p.score<45){ title="队长"; color="#0f5"; }
  else{ title="战神"; color="#f0f"; }

  titleEl.textContent=title;
  titleEl.style.color=color;

  if(titleEl.dataset.last !== title){
    titleEl.dataset.last = title;
    showPopup(title);
    levelSnd.play();
  }
}

function showPopup(text){
  levelPopup.textContent=text;
  levelPopup.classList.add("show");
  setTimeout(()=>levelPopup.classList.remove("show"),1500);
}

function updateUI(){
  scoreEl.textContent=p.score;
  hpEl.textContent=p.hp;
  levelEl.textContent=p.level;
  updateTitle();
}

function gameOverFun(){
  ended=true;
  bgm.pause();
  gameOver.style.display="block";
  restartBtn.style.display="block";
}

function winFun(){
  ended=true;
  bgm.pause();
  winGame.style.display="block";
  restartBtn.style.display="block";
}

function shake(){
  game.classList.add("shake");
  setTimeout(()=>game.classList.remove("shake"),300);
}

function loop(){
  if(!started || ended){
    requestAnimationFrame(loop);
    return;
  }
  movePlayer();
  moveEnemies();
  checkPlayerHurt();
  updateUI();
  if(p.score>=WIN_SCORE) winFun();
  requestAnimationFrame(loop);
}

startBtn.onclick=startGame;
restartBtn.onclick=()=>{ location.reload(); };

document.addEventListener("keydown",e=>{
  if(e.key in keys) keys[e.key]=true;
  if(e.code==="Space") placeMine();
});

document.addEventListener("keyup",e=>{
  if(e.key in keys) keys[e.key]=false;
});
</script>
</body>
</html>
