<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心智拾荒者 - 果汁感拉满版</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #030406; color: #c5c6c7;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; user-select: none;
        }

        #game-container {
            position: relative; width: 800px; height: 600px;
            background: radial-gradient(circle at 50% 100%, #1a222a 0%, #030406 80%);
            border: 1px solid rgba(102, 252, 241, 0.4);
            box-shadow: 0 0 40px rgba(69, 162, 158, 0.3);
            border-radius: 16px; overflow: hidden;
            transition: transform 0.05s; /* 用于屏幕震动 */
        }

        #ui-layer {
            position: absolute; top: 15px; left: 25px; right: 25px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 20px; font-weight: bold; pointer-events: none;
            text-transform: uppercase; letter-spacing: 1.5px; z-index: 5;
        }

        .neon-text { 
            color: #66fcf1; text-shadow: 0 0 8px rgba(102, 252, 241, 0.8); 
            display: inline-block; transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #control-panel { display: flex; gap: 10px; pointer-events: auto; }
        .ctrl-btn {
            background: rgba(31, 40, 51, 0.5); border: 1px solid rgba(102, 252, 241, 0.6);
            color: #66fcf1; padding: 5px 15px; border-radius: 5px; cursor: pointer;
            font-size: 14px; text-transform: uppercase; transition: all 0.2s;
        }
        .ctrl-btn:hover { background: rgba(102, 252, 241, 0.2); box-shadow: 0 0 10px rgba(102, 252, 241, 0.4); }

        #message-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 4, 6, 0.88); backdrop-filter: blur(8px);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }

        #game-title { margin: 0 0 10px 0; color: #66fcf1; font-size: 50px; text-shadow: 0 0 18px #66fcf1; }
        #game-desc { font-size: 16px; margin-bottom: 30px; text-align: center; line-height: 1.8; color: #a0aab5; max-width: 500px;}
        
        .hook-selection { display: flex; gap: 20px; margin-bottom: 30px; }
        .hook-card {
            background: rgba(11, 12, 16, 0.7); border: 2px solid #45a29e;
            padding: 18px; border-radius: 12px; width: 140px; text-align: center; cursor: pointer; transition: all 0.3s;
        }
        .hook-card:hover:not(.selected) { background: rgba(102, 252, 241, 0.1); border-color: rgba(102, 252, 241, 0.6); }
        .hook-card.selected { background: rgba(102, 252, 241, 0.15); border-color: #66fcf1; box-shadow: 0 0 25px rgba(102, 252, 241, 0.6); transform: scale(1.05); }
        .hook-card h3 { margin: 0 0 8px 0; font-size: 18px; color: #fff; }
        .hook-card span { font-size: 12px; color: #aaa; display: block; }

        .start-btn {
            padding: 12px 50px; font-size: 24px; font-weight: bold;
            background-color: transparent; color: #66fcf1; border: 2px solid #66fcf1; border-radius: 8px;
            cursor: pointer; transition: all 0.3s; text-transform: uppercase;
        }
        .start-btn:hover { background-color: #66fcf1; color: #0b0c10; box-shadow: 0 0 30px #66fcf1; transform: scale(1.05);}
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div>Score: <span id="score" class="neon-text">0</span> / <span id="target-score">2500</span></div>
            <div>Time: <span id="time" class="neon-text">60</span>s</div>
            <div id="control-panel">
                <button class="ctrl-btn" id="pause-btn">暂停 PAUSE</button>
                <button class="ctrl-btn" id="quit-btn">退出 QUIT</button>
            </div>
        </div>
        
        <canvas id="canvas" width="800" height="600"></canvas>

        <div id="message-overlay">
            <h1 id="game-title">心智拾荒者</h1>
            <p id="game-desc">极速版：心锚摆动速度提升150%！<br>抓取深海中的情绪火花，享受果汁感爆棚的灵魂回响。<br>当心沉重的思维顽石与破坏性的情绪炸弹。</p>
            
            <div class="hook-selection" id="hook-container">
                <div class="hook-card selected" data-type="DEFAULT">
                    <h3>灵魂之束</h3>
                    <span>均衡型<br>范围中等 / 速度中等</span>
                </div>
                <div class="hook-card" data-type="SNIPER">
                    <h3>精准光针</h3>
                    <span>技巧型<br>范围极小 / 极速射出</span>
                </div>
                <div class="hook-card" data-type="MAGNET">
                    <h3>引力磁场</h3>
                    <span>覆盖型<br>范围巨大 / 沉重缓慢</span>
                </div>
            </div>
            <button class="start-btn" id="start-btn">开始潜入</button>
        </div>
    </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const timeEl = document.getElementById('time');
const overlay = document.getElementById('message-overlay');
const gameTitle = document.getElementById('game-title');
const gameDesc = document.getElementById('game-desc');
const startBtn = document.getElementById('start-btn');
const pauseBtn = document.getElementById('pause-btn');
const quitBtn = document.getElementById('quit-btn');
const hookCards = document.querySelectorAll('.hook-card');

const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2, PAUSED: 3 };
let gameState = STATE.MENU;
let score = 0; let targetScore = 2500; let timeLeft = 60;
let timerInterval; let globalTime = 0;

const originX = 400; const originY = 65;

// VFX 数组 (果汁感系统)
let particles = [];
let ripples = [];
let floatingTexts = [];

// === 核心改动 1：速度提升 ===
// 原摆动速度 0.022 -> 提升 150% 即 0.022 + (0.022 * 1.5) = 0.055
const NEW_SWING_SPEED = 0.055; 

const HOOK_TYPES = {
    DEFAULT: { shootSpeed: 15, retractSpeed: 12, radius: 15 },
    SNIPER: { shootSpeed: 28, retractSpeed: 20, radius: 5 },
    MAGNET: { shootSpeed: 8, retractSpeed: 6, radius: 40 }
};
let selectedHookConfig = HOOK_TYPES.DEFAULT;
let activeHookTypeStr = "DEFAULT";

const HOOK_STATE = { SWINGING: 0, SHOOTING: 1, RETRACTING: 2 };
let hook = { x: 0, y: 0, angle: 0, angleDir: 1, swingSpeed: NEW_SWING_SPEED, length: 80, state: HOOK_STATE.SWINGING, caughtItem: null };

const SPARK_TYPES = {
    YELLOW: { color: '#f3e500', innerGlow: '#fff', coreRadius: 5, spread: 15, filaments: 12, score: 100, weight: 1 },
    RED:    { color: '#ff4b4b', innerGlow: '#ffccd0', coreRadius: 8, spread: 25, filaments: 20, score: 600, weight: 4.5 },
    BLUE:   { color: '#4facfe', innerGlow: '#fff', coreRadius: 6, spread: 18, filaments: 15, score: 250, weight: 2 },
    GREEN:  { color: '#2ecc71', innerGlow: '#fff', coreRadius: 4, spread: 12, filaments: 10, score: 150, weight: 1.5 },
    ROCK:   { color: '#555566', score: 20, weight: 7, radius: 35, type: 'ROCK' },
    BOMB:   { color: '#111', score: -300, weight: 1, radius: 20, type: 'BOMB' }
};
let items = [];

hookCards.forEach(card => {
    card.addEventListener('click', () => {
        if (gameState !== STATE.MENU) return;
        hookCards.forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        activeHookTypeStr = card.getAttribute('data-type');
        selectedHookConfig = HOOK_TYPES[activeHookTypeStr];
    });
});

function initLevel() {
    items = []; particles = []; ripples = []; floatingTexts = [];
    const pool = [
        ...Array(8).fill(SPARK_TYPES.YELLOW), ...Array(5).fill(SPARK_TYPES.GREEN),
        ...Array(4).fill(SPARK_TYPES.BLUE), ...Array(2).fill(SPARK_TYPES.RED),
        ...Array(6).fill(SPARK_TYPES.ROCK), ...Array(3).fill(SPARK_TYPES.BOMB)
    ];

    pool.forEach(config => {
        let valid = false; let x, y;
        let radius = config.type ? config.radius : config.spread + config.coreRadius;
        while (!valid) {
            x = Math.random() * 700 + 50; y = Math.random() * 380 + 170;
            valid = true;
            for (let i = 0; i < items.length; i++) {
                let otherRadius = items[i].type ? items[i].radius : items[i].spread + items[i].coreRadius;
                if (Math.hypot(x - items[i].x, y - items[i].y) < radius + otherRadius + 15) { valid = false; break; }
            }
        }
        items.push({ ...config, x, y, active: true, offsetTime: Math.random() * 100, rotSpeed: (Math.random() - 0.5) * 0.04 });
    });
}

// === VFX 生成函数 ===
function spawnJuice(x, y, color, isBomb) {
    // 1. 震荡波
    ripples.push({ x, y, radius: 5, maxRadius: isBomb ? 100 : 40, life: 1, color });
    
    // 2. 粒子飞溅
    let pCount = isBomb ? 40 : 15;
    for(let i=0; i<pCount; i++) {
        let angle = Math.random() * Math.PI * 2;
        let speed = Math.random() * (isBomb ? 8 : 4) + 1;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1.0, color, size: Math.random() * 3 + 2
        });
    }
}

function spawnFloatingText(x, y, amount, color) {
    floatingTexts.push({
        x, y: y - 20,
        text: (amount > 0 ? "+" : "") + amount,
        life: 1.0, color, vy: -1.5
    });
}

function triggerScorePunch() {
    scoreEl.style.transform = "scale(1.6)";
    scoreEl.style.color = "#fff";
    setTimeout(() => {
        scoreEl.style.transform = "scale(1)";
        scoreEl.style.color = "#66fcf1";
    }, 150);
}

function screenShake(intensity) {
    const gameDiv = document.getElementById('game-container');
    let x = (Math.random() - 0.5) * intensity;
    let y = (Math.random() - 0.5) * intensity;
    gameDiv.style.transform = `translate(${x}px, ${y}px)`;
    
    if(intensity > 20) gameDiv.style.boxShadow = "0 0 60px rgba(255, 0, 0, 0.6)";
    else gameDiv.style.boxShadow = `0 0 40px rgba(255, 255, 255, 0.5)`;

    setTimeout(() => { 
        gameDiv.style.transform = "translate(0, 0)"; 
        gameDiv.style.boxShadow = "0 0 40px rgba(69, 162, 158, 0.3)";
    }, 100);
}

function update() {
    if (gameState !== STATE.PLAYING) return;
    globalTime++;

    // 钩子摆动
    if (hook.state === HOOK_STATE.SWINGING) {
        hook.angle += hook.swingSpeed * hook.angleDir;
        if (Math.abs(hook.angle) > Math.PI * 0.45) hook.angleDir *= -1;
        updateHookPos();
    } 
    // 钩子发射
    else if (hook.state === HOOK_STATE.SHOOTING) {
        hook.length += selectedHookConfig.shootSpeed;
        updateHookPos();

        for (let i = 0; i < items.length; i++) {
            let item = items[i]; if (!item.active) continue;
            let itemRadius = item.type ? item.radius : (item.spread + item.coreRadius);
            
            if (Math.hypot(hook.x - item.x, hook.y - item.y) < selectedHookConfig.radius + itemRadius * 0.7) {
                hook.caughtItem = item; item.active = false;
                hook.state = HOOK_STATE.RETRACTING;
                
                // === 触发抓取果汁感 ===
                let effectColor = item.type === 'BOMB' ? '#ff0000' : (item.type === 'ROCK' ? '#aaa' : item.innerGlow);
                spawnJuice(item.x, item.y, effectColor, item.type === 'BOMB');
                
                if (item.type === 'BOMB') {
                    score += item.score;
                    hook.caughtItem = null;
                    hook.retractSpeedNow = selectedHookConfig.retractSpeed * 2; 
                    screenShake(25); // 剧烈震动
                    spawnFloatingText(item.x, item.y, item.score, '#ff0000');
                    triggerScorePunch();
                    scoreEl.innerText = score;
                } else {
                    screenShake(5); // 轻微打击感震动
                    hook.retractSpeedNow = Math.max(1.8, selectedHookConfig.retractSpeed - item.weight);
                }
                break;
            }
        }
        if (hook.x < -10 || hook.x > 810 || hook.y > 610 || hook.length > 760) {
            hook.state = HOOK_STATE.RETRACTING; hook.retractSpeedNow = selectedHookConfig.retractSpeed;
        }
    } 
    // 钩子收回
    else if (hook.state === HOOK_STATE.RETRACTING) {
        hook.length -= hook.retractSpeedNow;
        updateHookPos();
        if (hook.caughtItem) { 
            let radius = hook.caughtItem.type ? hook.caughtItem.radius : hook.caughtItem.coreRadius;
            hook.caughtItem.x = hook.x; hook.caughtItem.y = hook.y + radius * 0.8; 
        }
        
        // 成功拉回到顶部
        if (hook.length <= 80) {
            hook.length = 80; hook.state = HOOK_STATE.SWINGING;
            if (hook.caughtItem) { 
                score += hook.caughtItem.score;
                
                // === 触发得分果汁感 ===
                let textColor = hook.caughtItem.type === 'ROCK' ? '#aaa' : hook.caughtItem.color;
                spawnFloatingText(originX, originY + 20, hook.caughtItem.score, textColor);
                triggerScorePunch();
                
                hook.caughtItem = null; 
                scoreEl.innerText = score; 
            }
        }
    }

    // 更新 VFX 状态
    particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.03; });
    particles = particles.filter(p => p.life > 0);

    ripples.forEach(r => { r.radius += 2; r.life -= 0.05; });
    ripples = ripples.filter(r => r.life > 0);

    floatingTexts.forEach(ft => { ft.y += ft.vy; ft.life -= 0.02; });
    floatingTexts = floatingTexts.filter(ft => ft.life > 0);
}

function updateHookPos() {
    hook.x = originX + hook.length * Math.sin(hook.angle);
    hook.y = originY + hook.length * Math.cos(hook.angle);
}

function drawSparkFirework(cx, cy, config, globalTime) {
    let { color, innerGlow, coreRadius, spread, filaments, offsetTime, rotSpeed } = config;
    let rotation = globalTime * rotSpeed + offsetTime;
    let pulse = 1 + Math.sin(globalTime * 0.06 + offsetTime) * 0.1;
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(rotation);
    ctx.shadowBlur = 10 * pulse; ctx.shadowColor = innerGlow;
    ctx.fillStyle = coreRadius > 5 ? innerGlow : color;
    ctx.beginPath(); ctx.arc(0, 0, coreRadius * pulse, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 5; ctx.shadowColor = color; ctx.strokeStyle = color;
    ctx.lineWidth = 1.5; ctx.lineCap = 'round';
    for (let i = 0; i < filaments; i++) {
        let angle = (i / filaments) * Math.PI * 2;
        let randSpread = spread * (0.8 + Math.sin(globalTime * 0.1 + i) * 0.2); 
        let randOffset = coreRadius * (Math.sin(globalTime*0.05 + i) * 0.3);
        ctx.beginPath(); let startR = coreRadius * 0.7;
        ctx.moveTo(startR * Math.cos(angle + randOffset), startR * Math.sin(angle));
        let endR = coreRadius + randSpread;
        ctx.quadraticCurveTo(
            (coreRadius + randSpread * 0.5) * Math.cos(angle + randOffset * 1.5), 
            (coreRadius + randSpread * 0.5) * Math.sin(angle + randOffset * 1.5),
            endR * Math.cos(angle), endR * Math.sin(angle)
        ); ctx.stroke();
    }
    ctx.restore();
}

function drawSoulMain() {
    ctx.save(); ctx.translate(originX, originY - 25);
    let soulPulse = Math.sin(globalTime * 0.05) * 5;
    let soulGrd = ctx.createRadialGradient(0, soulPulse, 5, 0, soulPulse, 35);
    soulGrd.addColorStop(0, 'rgba(102, 252, 241, 0.9)');
    soulGrd.addColorStop(0.5, 'rgba(69, 162, 158, 0.7)');
    soulGrd.addColorStop(1, 'rgba(11, 12, 16, 0)');
    ctx.fillStyle = soulGrd; ctx.shadowBlur = 15; ctx.shadowColor = "rgba(102, 252, 241, 0.6)";
    ctx.beginPath(); ctx.moveTo(0, -35); ctx.bezierCurveTo(20, -15, 20, 15, 0, 35);
    ctx.bezierCurveTo(-20, 15, -20, -15, 0, -35); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(102, 252, 241, 0.4)'; ctx.beginPath(); ctx.moveTo(0, 35);
    for(let i=0; i<3; i++) { let wave = Math.sin(globalTime * 0.2 + i) * 5; ctx.lineTo(wave, 35 + i*10); }
    ctx.lineTo(0, 60); ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 10; ctx.fillStyle = "rgba(255,255,255, 0.8)";
    let firePulse = Math.abs(Math.sin(globalTime*0.1)) * 2;
    ctx.beginPath(); ctx.arc(-10, soulPulse, 3+firePulse, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(10, soulPulse, 3+firePulse, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}

function drawClaw() {
    ctx.save(); ctx.translate(hook.x, hook.y); ctx.rotate(-hook.angle); 
    ctx.strokeStyle = '#66fcf1'; ctx.shadowBlur = 12; ctx.shadowColor = '#66fcf1'; ctx.lineJoin = "round";
    if (activeHookTypeStr === "DEFAULT") {
        ctx.lineWidth = 3; ctx.beginPath();
        ctx.moveTo(-15, -12); ctx.quadraticCurveTo(0, 0, -15, 12);
        ctx.moveTo(15, -12); ctx.quadraticCurveTo(0, 0, 15, 12); ctx.stroke();
    } else if (activeHookTypeStr === "SNIPER") {
        ctx.lineWidth = 2.5; ctx.beginPath();
        ctx.moveTo(0, -15); ctx.lineTo(0, 30);
        ctx.moveTo(-5, 0); ctx.lineTo(0, 10); ctx.lineTo(5, 0); ctx.stroke();
    } else if (activeHookTypeStr === "MAGNET") {
        ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(0, 10, 20, Math.PI, 0, false); ctx.stroke();
        ctx.strokeStyle = `rgba(102, 252, 241, ${Math.abs(Math.cos(globalTime*0.1))})`;
        ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(0, 10, 40, 0, Math.PI*2); ctx.stroke();
    }
    ctx.restore();
}

function drawVFX() {
    // 绘制震荡波
    ripples.forEach(r => {
        ctx.beginPath();
        ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
        ctx.strokeStyle = r.color;
        ctx.lineWidth = 2;
        ctx.globalAlpha = r.life;
        ctx.stroke();
        ctx.globalAlpha = 1.0;
    });

    // 绘制粒子
    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.shadowBlur = 5; ctx.shadowColor = p.color;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1.0;
    });

    // 绘制飘字
    floatingTexts.forEach(ft => {
        ctx.font = "bold 28px 'Segoe UI'";
        ctx.textAlign = "center";
        ctx.fillStyle = ft.color;
        ctx.globalAlpha = ft.life;
        ctx.shadowBlur = 10; ctx.shadowColor = ft.color;
        ctx.fillText(ft.text, ft.x, ft.y);
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1.0;
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawSoulMain(); 

    ctx.strokeStyle = 'rgba(197, 198, 199, 0.5)'; ctx.lineWidth = 1.5; 
    ctx.beginPath(); ctx.moveTo(originX, originY); ctx.lineTo(hook.x, hook.y); ctx.stroke();
    
    if(hook.state === HOOK_STATE.SHOOTING) {
        // 发射时的虚影轨迹 (果汁感)
        ctx.strokeStyle = 'rgba(102, 252, 241, 0.2)'; ctx.lineWidth = 10;
        ctx.beginPath(); ctx.moveTo(originX, originY); ctx.lineTo(hook.x, hook.y); ctx.stroke();
    }

    drawClaw(); 

    items.forEach(item => {
        if (!item.active && hook.caughtItem !== item) return;
        if (!item.type) { drawSparkFirework(item.x, item.y, item, globalTime); } 
        else {
            ctx.save(); ctx.translate(item.x, item.y);
            if (item.type === 'BOMB') {
                let pulse = Math.floor(globalTime / 5) % 2 === 0 ? "#ff0000" : "#550000";
                ctx.shadowBlur = 20; ctx.shadowColor = pulse;
                ctx.fillStyle = "#1a0000"; ctx.beginPath(); ctx.arc(0, 0, item.radius, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = pulse; ctx.font = "bold 22px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("B", 0, 0);
            } else {
                ctx.fillStyle = item.color; ctx.beginPath(); 
                ctx.moveTo(0, -item.radius); ctx.lineTo(item.radius, -item.radius*0.3);
                ctx.lineTo(item.radius*0.8, item.radius*0.8); ctx.lineTo(-item.radius, item.radius*0.5);
                ctx.lineTo(-item.radius*0.7, -item.radius*0.7); ctx.closePath(); ctx.fill();
                ctx.lineWidth = 1; ctx.strokeStyle = "#aaa"; ctx.stroke();
            }
            ctx.restore();
        }
    });

    drawVFX(); // 渲染所有特效
}

function fireHook() {
    if (gameState === STATE.PLAYING && hook.state === HOOK_STATE.SWINGING) {
        hook.state = HOOK_STATE.SHOOTING;
    }
}

function startGame() {
    gameState = STATE.PLAYING; score = 0; timeLeft = 60;
    scoreEl.innerText = score; timeEl.innerText = timeLeft;
    overlay.classList.add('hidden');
    document.getElementById('hook-container').classList.add('hidden');
    
    hook.state = HOOK_STATE.SWINGING; hook.length = 80; hook.caughtItem = null; hook.angle = 0;
    initLevel(); startTimer();
}

function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if (gameState !== STATE.PLAYING) return;
        timeLeft--; timeEl.innerText = timeLeft;
        if (timeLeft <= 0) endGame();
    }, 1000);
}

function pauseGame() {
    if (gameState === STATE.PLAYING) {
        gameState = STATE.PAUSED; clearInterval(timerInterval);
        overlay.classList.remove('hidden');
        gameTitle.innerText = "已暂停 PAUSED"; gameTitle.style.color = "#aaa"; gameTitle.style.textShadow = "none";
        gameDesc.innerText = "心智停止了思考，点击按钮继续回想起逝去的情感。";
        document.getElementById('hook-container').classList.add('hidden');
        startBtn.innerText = "恢复唤醒 (RESUME)"; startBtn.onclick = resumeGame; 
        pauseBtn.innerText = "继续 RESUME";
    }
}

function resumeGame() {
    gameState = STATE.PLAYING; overlay.classList.add('hidden');
    startTimer(); pauseBtn.innerText = "暂停 PAUSE";
}

function quitToMenu() {
    gameState = STATE.MENU; clearInterval(timerInterval);
    overlay.classList.remove('hidden'); document.getElementById('hook-container').classList.remove('hidden');
    gameTitle.innerText = "心智拾荒者"; gameTitle.style.color = "#66fcf1"; gameTitle.style.textShadow = "0 0 18px #66fcf1";
    gameDesc.innerHTML = "极速版：心锚摆动速度提升150%！<br>抓取深海中的情绪火花，享受果汁感爆棚的灵魂回响。<br>当心沉重的思维顽石与破坏性的情绪炸弹。";
    startBtn.innerText = "开始潜入"; startBtn.onclick = startGame;
    pauseBtn.innerText = "暂停 PAUSE";
}

function endGame() {
    gameState = STATE.GAMEOVER; clearInterval(timerInterval);
    overlay.classList.remove('hidden'); document.getElementById('hook-container').classList.remove('hidden');
    startBtn.onclick = startGame; 
    
    if (score >= targetScore) {
        gameTitle.innerText = "重获温度 SUCCESS!"; gameTitle.style.color = "#fff300"; gameTitle.style.textShadow = "0 0 20px #fff300";
        gameDesc.innerText = `你收集了 ${score} 分的情感火花。灵魂核心正在重塑，思维原野重现希望。`;
    } else {
        gameTitle.innerText = "重陷沉沦 FAILURE..."; gameTitle.style.color = "#ff4b4b"; gameTitle.style.textShadow = "0 0 20px #ff4b4b";
        gameDesc.innerText = `分数: ${score} / 目标: ${targetScore}\n遗憾，未能唤回足够的温度，心智将再次冰封。`;
    }
    startBtn.innerText = "再次尝试重塑";
}

window.addEventListener('mousedown', fireHook);
window.addEventListener('keydown', (e) => { 
    if (e.code === 'Space') { e.preventDefault(); fireHook(); }
    if (e.code === 'KeyP') { e.preventDefault(); (gameState === STATE.PAUSED ? resumeGame : pauseGame)(); }
});
startBtn.onclick = startGame;
pauseBtn.onclick = (e) => { e.stopPropagation(); (gameState === STATE.PAUSED ? resumeGame : pauseGame)(); };
quitBtn.onclick = (e) => { e.stopPropagation(); quitToMenu(); };

function gameLoop() {
    if (gameState === STATE.PLAYING) update();
    if (gameState !== STATE.GAMEOVER) draw();
    requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

</script>
</body>
</html>
