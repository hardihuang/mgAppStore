<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake with Custom Obstacles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        canvas {
            image-rendering: pixelated;
            max-width: 100%;
            height: auto;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        .control-btn {
            background: #334155;
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .control-btn:active {
            background: #475569;
        }
        input[type=range] {
            cursor: pointer;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-2xl bg-slate-800 p-6 rounded-2xl shadow-2xl border border-slate-700">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-emerald-400">Snake 2.0</h1>
            <div class="text-right">
                <div class="text-sm uppercase tracking-widest text-slate-400 font-semibold">Score</div>
                <div id="score" class="text-2xl font-mono text-white">0</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div class="flex flex-col gap-4">
                <div class="flex flex-col gap-1">
                    <label class="text-sm font-medium text-slate-300 flex justify-between">
                        Board Size: <span class="text-emerald-400"><span id="sizeVal">20</span>x<span id="sizeVal2">20</span></span>
                    </label>
                    <input type="range" id="sizeInput" min="12" max="35" value="20" class="w-full accent-emerald-500">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-sm font-medium text-slate-300 flex justify-between">
                        Wall Clusters: <span id="wallVal" class="text-emerald-400">5</span>
                    </label>
                    <input type="range" id="wallInput" min="0" max="50" value="5" class="w-full accent-emerald-500">
                </div>
            </div>
            <div class="flex items-end">
                <button id="resetBtn" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg font-bold transition-colors shadow-lg active:scale-95 transform">
                    New Game / Reset
                </button>
            </div>
        </div>

        <div class="relative flex justify-center bg-slate-900 rounded-lg overflow-hidden border-4 border-slate-700">
            <canvas id="gameCanvas"></canvas>
            
            <div id="overlay" class="hidden absolute inset-0 bg-slate-900/80 flex flex-col items-center justify-center text-center p-4">
                <h2 class="text-4xl font-black text-red-500 mb-2">CRASHED!</h2>
                <p id="finalScore" class="text-xl text-white mb-6"></p>
                <button onclick="initGame()" class="px-8 py-3 bg-emerald-600 text-white rounded-full font-bold text-lg hover:scale-105 transition-transform">
                    Try Again (Enter)
                </button>
            </div>
        </div>

        <div class="mt-8 grid grid-cols-3 gap-2 max-w-[200px] mx-auto md:hidden">
            <div></div>
            <button class="control-btn" onmousedown="handleManualMove('UP')" ontouchstart="handleManualMove('UP')">
                <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M12 8l-6 6 1.41 1.41L12 10.83l4.59 4.58L18 14z"/></svg>
            </button>
            <div></div>
            <button class="control-btn" onmousedown="handleManualMove('LEFT')" ontouchstart="handleManualMove('LEFT')">
                <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
            </button>
            <button class="control-btn" onmousedown="handleManualMove('DOWN')" ontouchstart="handleManualMove('DOWN')">
                <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M12 16l6-6-1.41-1.41L12 13.17 7.41 8.59 6 10z"/></svg>
            </button>
            <button class="control-btn" onmousedown="handleManualMove('RIGHT')" ontouchstart="handleManualMove('RIGHT')">
                <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
            </button>
        </div>
        
        <div class="mt-6 flex flex-wrap justify-center gap-4 text-xs font-semibold uppercase tracking-wider">
            <div class="flex items-center gap-2"><div class="w-3 h-3 bg-emerald-500 rounded"></div> You</div>
            <div class="flex items-center gap-2"><div class="w-3 h-3 bg-purple-500 rounded"></div> Ghost AI</div>
            <div class="flex items-center gap-2"><div class="w-3 h-3 bg-orange-500 rounded"></div> Competitor AI</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const sizeInput = document.getElementById('sizeInput');
        const sizeVal = document.getElementById('sizeVal');
        const sizeVal2 = document.getElementById('sizeVal2');
        const wallInput = document.getElementById('wallInput');
        const wallVal = document.getElementById('wallVal');
        const resetBtn = document.getElementById('resetBtn');
        const overlay = document.getElementById('overlay');
        const finalScore = document.getElementById('finalScore');

        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'eat') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
            } else if (type === 'crash') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.linearRampToValueAtTime(40, now + 0.3);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            } else if (type === 'ai-eat') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 0.1);
                gain.gain.setValueAtTime(0.05, now);
                osc.start(); osc.stop(now + 0.1);
            }
        }

        let gridSize = 20;
        const cellSize = 20;
        let snake = [];
        let ghosts = []; // Array of 3 ghost snakes
        let competitor = null; // 1 competitor snake
        let food = {x: 0, y: 0};
        let walls = [];
        let direction = 'RIGHT';
        let nextDirection = 'RIGHT';
        let score = 0;
        let gameLoop = null;
        let speed = 150;
        let isGameOver = false;

        function initGame() {
            initAudio();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            clearInterval(gameLoop);
            overlay.classList.add('hidden');
            isGameOver = false;
            
            gridSize = parseInt(sizeInput.value);
            canvas.width = gridSize * cellSize;
            canvas.height = gridSize * cellSize;
            
            // Player
            snake = [{x: 2, y: 2}, {x: 1, y: 2}, {x: 0, y: 2}];
            
            // 3 Ghost Snakes
            ghosts = [
                { body: [{x: gridSize-1, y: 0}], dir: 'LEFT' },
                { body: [{x: 0, y: gridSize-1}], dir: 'UP' },
                { body: [{x: gridSize-1, y: gridSize-1}], dir: 'UP' }
            ];

            // 1 Competitor Snake
            competitor = {
                body: [{x: Math.floor(gridSize/2), y: gridSize-2}, {x: Math.floor(gridSize/2), y: gridSize-1}],
                dir: 'UP'
            };

            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            scoreEl.innerText = score;
            speed = 150;

            generateWalls();
            spawnFood();
            gameLoop = setInterval(draw, speed);
        }

        function generateWalls() {
            walls = [];
            const numClusters = parseInt(wallInput.value);
            for (let i = 0; i < numClusters; i++) {
                let rx = Math.floor(Math.random() * (gridSize - 4)) + 2;
                let ry = Math.floor(Math.random() * (gridSize - 4)) + 2;
                if (rx < 4 && ry < 4) continue; 
                let clusterSize = Math.floor(Math.random() * 3) + 2;
                let cluster = [{x: rx, y: ry}];
                for (let j = 0; j < clusterSize; j++) {
                    let last = cluster[cluster.length - 1];
                    let neighbors = [{x: last.x+1, y: last.y}, {x: last.x-1, y: last.y}, {x: last.x, y: last.y+1}, {x: last.x, y: last.y-1}];
                    let pick = neighbors[Math.floor(Math.random() * neighbors.length)];
                    if (pick.x > 0 && pick.x < gridSize-1 && pick.y > 0 && pick.y < gridSize-1) {
                        if (!cluster.some(p => p.x === pick.x && p.y === pick.y)) cluster.push(pick);
                    }
                }
                walls = [...walls, ...cluster];
            }
        }

        function spawnFood() {
            let attempts = 0;
            while (attempts < 300) {
                let f = { x: Math.floor(Math.random() * gridSize), y: Math.floor(Math.random() * gridSize) };
                const onWall = walls.some(w => w.x === f.x && w.y === f.y);
                const onSnake = snake.some(s => s.x === f.x && s.y === f.y);
                const onGhost = ghosts.some(g => g.body.some(b => b.x === f.x && b.y === f.y));
                const onComp = competitor.body.some(b => b.x === f.x && b.y === f.y);
                if (!onWall && !onSnake && !onGhost && !onComp) {
                    food = f;
                    break;
                }
                attempts++;
            }
        }

        function isPosSafe(x, y, ignoreOwnBody = null) {
            if (x < 0 || x >= gridSize || y < 0 || y >= gridSize) return false;
            if (walls.some(w => w.x === x && w.y === y)) return false;
            if (snake.some(s => s.x === x && s.y === y)) return false;
            if (ghosts.some(g => g.body.some(b => b.x === x && b.y === y))) return false;
            if (competitor.body.some(b => b.x === x && b.y === y && b !== ignoreOwnBody)) return false;
            return true;
        }

        function moveAIs() {
            const dirs = ['UP', 'DOWN', 'LEFT', 'RIGHT'];
            const getCoord = (h, d) => {
                if (d === 'UP') return {x: h.x, y: h.y - 1};
                if (d === 'DOWN') return {x: h.x, y: h.y + 1};
                if (d === 'LEFT') return {x: h.x - 1, y: h.y};
                if (d === 'RIGHT') return {x: h.x + 1, y: h.y};
            };

            // Move Ghosts (Obstacles)
            ghosts.forEach(g => {
                let head = g.body[0];
                let next = getCoord(head, g.dir);
                if (!isPosSafe(next.x, next.y) || Math.random() < 0.1) {
                    let valid = dirs.filter(d => {
                        let p = getCoord(head, d);
                        return isPosSafe(p.x, p.y);
                    });
                    if (valid.length) {
                        g.dir = valid[Math.floor(Math.random() * valid.length)];
                        next = getCoord(head, g.dir);
                    }
                }
                g.body.unshift(next);
                g.body.pop();
            });

            // Move Competitor (Food Seeker)
            let cHead = competitor.body[0];
            let cNextDir = competitor.dir;
            
            // Simple pathfinding: try to reduce distance to food
            let bestDist = Infinity;
            dirs.forEach(d => {
                let p = getCoord(cHead, d);
                if (isPosSafe(p.x, p.y)) {
                    let dist = Math.abs(p.x - food.x) + Math.abs(p.y - food.y);
                    if (dist < bestDist) {
                        bestDist = dist;
                        cNextDir = d;
                    }
                }
            });
            
            competitor.dir = cNextDir;
            let cNextPos = getCoord(cHead, competitor.dir);
            competitor.body.unshift(cNextPos);
            
            if (cNextPos.x === food.x && cNextPos.y === food.y) {
                playSound('ai-eat');
                spawnFood();
            } else {
                competitor.body.pop();
            }
        }

        function handleManualMove(dir) {
            if (isGameOver) return;
            if (dir === 'UP' && direction !== 'DOWN') nextDirection = 'UP';
            if (dir === 'DOWN' && direction !== 'UP') nextDirection = 'DOWN';
            if (dir === 'LEFT' && direction !== 'RIGHT') nextDirection = 'LEFT';
            if (dir === 'RIGHT' && direction !== 'LEFT') nextDirection = 'RIGHT';
        }

        window.addEventListener('keydown', e => {
            if (e.key === 'Enter' && isGameOver) { initGame(); return; }
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W': handleManualMove('UP'); break;
                case 'ArrowDown': case 's': case 'S': handleManualMove('DOWN'); break;
                case 'ArrowLeft': case 'a': case 'A': handleManualMove('LEFT'); break;
                case 'ArrowRight': case 'd': case 'D': handleManualMove('RIGHT'); break;
            }
        });

        function draw() {
            direction = nextDirection;
            let head = { ...snake[0] };
            if (direction === 'UP') head.y--;
            if (direction === 'DOWN') head.y++;
            if (direction === 'LEFT') head.x--;
            if (direction === 'RIGHT') head.x++;

            const hitWall = walls.some(w => w.x === head.x && w.y === head.y);
            const hitGhost = ghosts.some(g => g.body.some(b => b.x === head.x && b.y === head.y));
            const hitComp = competitor.body.some(b => b.x === head.x && b.y === head.y);
            
            if (head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize || 
                snake.some(seg => seg.x === head.x && seg.y === head.y) || hitWall || hitGhost || hitComp) {
                gameOver();
                return;
            }

            snake.unshift(head);
            moveAIs();

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.innerText = score;
                playSound('eat');
                spawnFood();
                if (speed > 40) {
                    clearInterval(gameLoop);
                    speed -= 5; 
                    gameLoop = setInterval(draw, speed);
                }
            } else {
                snake.pop();
            }

            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 1;
            for(let i=0; i<=gridSize; i++) {
                ctx.beginPath(); ctx.moveTo(i*cellSize, 0); ctx.lineTo(i*cellSize, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i*cellSize); ctx.lineTo(canvas.width, i*cellSize); ctx.stroke();
            }

            // Draw Walls
            ctx.fillStyle = '#64748b';
            walls.forEach(w => {
                ctx.beginPath(); ctx.roundRect(w.x * cellSize + 1, w.y * cellSize + 1, cellSize - 2, cellSize - 2, 4); ctx.fill();
            });

            // Draw Food
            ctx.fillStyle = '#f43f5e';
            ctx.beginPath(); ctx.arc(food.x * cellSize + cellSize/2, food.y * cellSize + cellSize/2, cellSize/2.5, 0, Math.PI*2); ctx.fill();

            // Draw Ghosts (Purple)
            ctx.fillStyle = '#a855f7';
            ghosts.forEach(g => {
                g.body.forEach(b => {
                    ctx.beginPath(); ctx.roundRect(b.x * cellSize + 1, b.y * cellSize + 1, cellSize - 2, cellSize - 2, 4); ctx.fill();
                });
            });

            // Draw Competitor (Orange)
            competitor.body.forEach((b, i) => {
                ctx.fillStyle = i === 0 ? '#f97316' : '#fb923c';
                ctx.beginPath(); ctx.roundRect(b.x * cellSize + 1, b.y * cellSize + 1, cellSize - 2, cellSize - 2, 4); ctx.fill();
            });

            // Draw Player (Emerald)
            snake.forEach((seg, i) => {
                ctx.fillStyle = i === 0 ? '#10b981' : '#34d399';
                ctx.beginPath(); ctx.roundRect(seg.x * cellSize + 1, seg.y * cellSize + 1, cellSize - 2, cellSize - 2, i === 0 ? 6 : 4); ctx.fill();
            });
        }

        function gameOver() {
            clearInterval(gameLoop);
            isGameOver = true;
            playSound('crash');
            finalScore.innerText = `Final Score: ${score}`;
            overlay.classList.remove('hidden');
        }

        sizeInput.addEventListener('input', () => {
            sizeVal.innerText = sizeInput.value;
            sizeVal2.innerText = sizeInput.value;
        });
        wallInput.addEventListener('input', () => { wallVal.innerText = wallInput.value; });
        resetBtn.addEventListener('click', initGame);
        window.onload = initGame;
    </script>
</body>
</html>
