<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹贪吃蛇 - Neon Snake</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Orbitron', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }
        
        .bg-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }
        
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50px, -50px); }
        }
        
        .game-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .top-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 800px;
            padding: 0 20px;
        }
        
        .score-display {
            text-align: left;
        }
        
        .score-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        
        .score-value {
            font-size: 48px;
            font-weight: 900;
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
            line-height: 1;
        }
        
        .high-score {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 5px;
        }
        
        .boost-panel {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }
        
        .boost-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .boost-icon {
            font-size: 20px;
            color: #ff00ff;
        }
        
        .boost-label {
            font-size: 14px;
            color: #ff00ff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .boost-bar-container {
            width: 250px;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }
        
        .boost-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff00ff, #ff00aa, #ff0066);
            border-radius: 6px;
            transition: width 0.1s;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
            position: relative;
            overflow: hidden;
        }
        
        .boost-bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .boost-hint {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 5px;
        }
        
        .game-container {
            position: relative;
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.15);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(0, 255, 255, 0.2);
        }
        
        canvas {
            display: block;
            background: rgba(10, 10, 20, 0.95);
        }
        
        .start-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            pointer-events: none;
            z-index: 10;
        }
        
        .start-hint.hidden {
            display: none;
        }
        
        .start-title {
            font-size: 28px;
            margin-bottom: 20px;
            color: #00ffff;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
            animation: pulse 2s ease-in-out infinite;
        }
        
        .start-text {
            font-size: 16px;
            line-height: 2;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .key {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            margin: 0 4px;
            font-size: 14px;
            color: #fff;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
        }
        
        .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            backdrop-filter: blur(10px);
            z-index: 20;
        }
        
        .game-over-screen.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .game-over-title {
            font-size: 56px;
            font-weight: 900;
            color: #ff0066;
            text-shadow: 0 0 40px rgba(255, 0, 102, 0.8);
            margin-bottom: 30px;
            animation: glitch 2s infinite;
        }
        
        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }
        
        .final-score-box {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .final-score-label {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
        }
        
        .final-score-value {
            font-size: 64px;
            font-weight: 900;
            color: #00ffff;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
        }
        
        .restart-hint {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .restart-btn {
            padding: 18px 50px;
            font-size: 20px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            background: transparent;
            color: #00ffff;
            border: 3px solid #00ffff;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 4px;
            position: relative;
            overflow: hidden;
        }
        
        .restart-btn:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.8);
            transform: translateY(-3px);
        }
        
        .legend {
            display: flex;
            gap: 30px;
            margin-top: 10px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legend-icon {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .legend-normal { background: #ff00ff; box-shadow: 0 0 10px #ff00ff; }
        .legend-speed { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .legend-time { background: #ffff00; box-shadow: 0 0 10px #ffff00; }
    </style>
<base target="_blank">
</head>
<body>
    <div class="bg-grid"></div>
    
    <div class="game-wrapper">
        <!-- 顶部信息面板 -->
        <div class="top-panel">
            <div class="score-display">
                <div class="score-label">得分</div>
                <div class="score-value" id="score">0</div>
                <div class="high-score">最高分: <span id="highScore">0</span></div>
            </div>
            
            <div class="boost-panel">
                <div class="boost-header">
                    <span class="boost-icon">⚡</span>
                    <span class="boost-label">加速能量</span>
                </div>
                <div class="boost-bar-container">
                    <div class="boost-bar-fill" id="boostBar" style="width: 100%"></div>
                </div>
                <div class="boost-hint">按住 <span class="key" style="padding: 2px 8px; font-size: 12px;">空格</span> 加速冲刺</div>
            </div>
        </div>
        
        <!-- 游戏区域 -->
        <div class="game-container">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            
            <div class="start-hint" id="startHint">
                <div class="start-title">🎮 NEON SNAKE</div>
                <div class="start-text">
                    <div>使用 <span class="key">↑</span> <span class="key">↓</span> <span class="key">←</span> <span class="key">→</span> 控制移动</div>
                    <div>按住 <span class="key">空格</span> 消耗能量加速</div>
                </div>
            </div>
            
            <div class="game-over-screen" id="gameOverScreen">
                <div class="game-over-title">GAME OVER</div>
                <div class="final-score-box">
                    <div class="final-score-label">最终得分</div>
                    <div class="final-score-value" id="finalScore">0</div>
                </div>
                <div class="restart-hint">按任意键或点击按钮重新开始</div>
                <button class="restart-btn" id="restartBtn">再次挑战</button>
            </div>
        </div>
        
        <!-- 底部图例 -->
        <div class="legend">
            <div class="legend-item">
                <div class="legend-icon legend-normal"></div>
                <span>普通食物 (+10分)</span>
            </div>
            <div class="legend-item">
                <div class="legend-icon legend-speed"></div>
                <span>能量补给 (+30能量)</span>
            </div>
            <div class="legend-item">
                <div class="legend-icon legend-time"></div>
                <span>时间减缓 (减速)</span>
            </div>
        </div>
    </div>

    <script>
        // 游戏配置
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GRID_SIZE = 20;
        const CELL_SIZE = canvas.width / GRID_SIZE;
        const INITIAL_SPEED = 150;
        const MIN_SPEED = 60;
        const BOOST_COST = 2;
        const BOOST_SPEED_MULTIPLIER = 0.4;
        const FOOD_SIZE_RATIO = 0.8; // 食物占格子的比例 (0-1)
        
        // 游戏状态
        let snake = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = null;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let lastTime = 0;
        let currentSpeed = INITIAL_SPEED;
        let isGameOver = false;
        let isPaused = true;
        let hue = 0;
        let foodRotation = 0;
        let boostEnergy = 100;
        let isBoosting = false;
        let particles = [];
        let foodType = 'normal';
        
        // 音效合成器
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            switch(type) {
                case 'eat':
                    osc.frequency.setValueAtTime(600, now);
                    osc.frequency.exponentialRampToValueAtTime(900, now + 0.1);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                    break;
                case 'boost':
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.linearRampToValueAtTime(80, now + 0.15);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                    break;
                case 'gameover':
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(40, now + 0.6);
                    gain.gain.setValueAtTime(0.4, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                    osc.start(now);
                    osc.stop(now + 0.6);
                    break;
                case 'powerup':
                    osc.frequency.setValueAtTime(500, now);
                    osc.frequency.exponentialRampToValueAtTime(800, now + 0.25);
                    gain.gain.setValueAtTime(0.25, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    osc.start(now);
                    osc.stop(now + 0.25);
                    break;
            }
        }
        
        // 初始化游戏
        function init() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            currentSpeed = INITIAL_SPEED;
            boostEnergy = 100;
            isGameOver = false;
            isPaused = true;
            hue = 0;
            particles = [];
            
            document.getElementById('score').textContent = '0';
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('boostBar').style.width = '100%';
            document.getElementById('gameOverScreen').classList.remove('active');
            document.getElementById('startHint').classList.remove('hidden');
            
            spawnFood();
            draw();
        }
        
        // 生成食物
        function spawnFood() {
            let attempts = 0;
            let maxAttempts = 200;
            let valid = false;
            
            while (!valid && attempts < maxAttempts) {
                food = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
                
                valid = true;
                for (let segment of snake) {
                    if (segment.x === food.x && segment.y === food.y) {
                        valid = false;
                        break;
                    }
                }
                attempts++;
            }
            
            if (!valid) {
                gameOver();
                return;
            }
            
            const rand = Math.random();
            if (rand < 0.12) {
                foodType = 'speed';
            } else if (rand < 0.24) {
                foodType = 'time';
            } else {
                foodType = 'normal';
            }
        }
        
        // 创建粒子效果
        function createParticles(x, y, color, count = 12) {
            const centerX = x * CELL_SIZE + CELL_SIZE / 2;
            const centerY = y * CELL_SIZE + CELL_SIZE / 2;
            
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count;
                const speed = 3 + Math.random() * 4;
                particles.push({
                    x: centerX,
                    y: centerY,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    color: color,
                    size: 2 + Math.random() * 3
                });
            }
        }
        
        // 更新粒子
        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.025;
                p.vx *= 0.96;
                p.vy *= 0.96;
                return p.life > 0;
            });
        }
        
        // 绘制粒子
        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 10 * p.life;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }
        
        // 游戏更新
        function update(currentTime) {
            if (isGameOver) return;
            
            const deltaTime = currentTime - lastTime;
            let speed = currentSpeed;
            
            // 处理加速
            if (isBoosting && boostEnergy > 0) {
                speed *= BOOST_SPEED_MULTIPLIER;
                boostEnergy = Math.max(0, boostEnergy - BOOST_COST);
                if (Math.random() < 0.3) playSound('boost');
            } else if (!isBoosting && boostEnergy < 100) {
                boostEnergy = Math.min(100, boostEnergy + 0.4);
            }
            
            // 更新能量条
            document.getElementById('boostBar').style.width = boostEnergy + '%';
            
            if (deltaTime < speed) {
                requestAnimationFrame(update);
                return;
            }
            
            lastTime = currentTime;
            
            if (isPaused) {
                requestAnimationFrame(update);
                return;
            }
            
            direction = nextDirection;
            
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
            
            // 碰撞检测
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                gameOver();
                return;
            }
            
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            // 吃食物检测 - 使用更大的碰撞范围
            const foodCenterX = food.x * CELL_SIZE + CELL_SIZE / 2;
            const foodCenterY = food.y * CELL_SIZE + CELL_SIZE / 2;
            const headCenterX = head.x * CELL_SIZE + CELL_SIZE / 2;
            const headCenterY = head.y * CELL_SIZE + CELL_SIZE / 2;
            const distance = Math.sqrt(
                Math.pow(foodCenterX - headCenterX, 2) + 
                Math.pow(foodCenterY - headCenterY, 2)
            );
            
            // 如果距离小于格子大小，判定为吃到
            if (distance < CELL_SIZE * 0.8) {
                let points = (foodType === 'normal') ? 10 : 20;
                score += points;
                document.getElementById('score').textContent = score;
                
                if (foodType === 'speed') {
                    boostEnergy = Math.min(100, boostEnergy + 30);
                    createParticles(food.x, food.y, '#00ff00', 15);
                    playSound('powerup');
                } else if (foodType === 'time') {
                    currentSpeed = Math.min(INITIAL_SPEED, currentSpeed + 15);
                    createParticles(food.x, food.y, '#ffff00', 15);
                    playSound('powerup');
                } else {
                    createParticles(food.x, food.y, '#00ffff', 12);
                    playSound('eat');
                }
                
                currentSpeed = Math.max(MIN_SPEED, currentSpeed - 2);
                spawnFood();
            } else {
                snake.pop();
            }
            
            hue = (hue + 2) % 360;
            foodRotation += 0.08;
            
            updateParticles();
            draw();
            requestAnimationFrame(update);
        }
        
        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = 'rgba(10, 10, 20, 0.95)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.04)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                const pos = i * CELL_SIZE;
                ctx.beginPath();
                ctx.moveTo(pos, 0);
                ctx.lineTo(pos, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, pos);
                ctx.lineTo(canvas.width, pos);
                ctx.stroke();
            }
            
            // 绘制蛇
            snake.forEach((segment, index) => {
                const x = segment.x * CELL_SIZE;
                const y = segment.y * CELL_SIZE;
                const size = CELL_SIZE - 2;
                
                const segmentHue = (hue - index * 12) % 360;
                const color = `hsl(${segmentHue}, 100%, 55%)`;
                const glowColor = `hsl(${segmentHue}, 100%, 40%)`;
                
                ctx.shadowBlur = 20;
                ctx.shadowColor = glowColor;
                
                ctx.fillStyle = color;
                roundRect(ctx, x + 1, y + 1, size, size, 6);
                
                ctx.shadowBlur = 0;
                ctx.fillStyle = `hsla(${segmentHue}, 100%, 80%, 0.4)`;
                roundRect(ctx, x + 4, y + 4, size - 6, size - 6, 4);
                
                // 蛇头眼睛
                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = '#fff';
                    const eyeSize = 3.5;
                    const offset = 5;
                    
                    if (direction.x === 1) {
                        ctx.beginPath(); ctx.arc(x + 14, y + offset, eyeSize, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(x + 14, y + CELL_SIZE - offset, eyeSize, 0, Math.PI*2); ctx.fill();
                    } else if (direction.x === -1) {
                        ctx.beginPath(); ctx.arc(x + 6, y + offset, eyeSize, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(x + 6, y + CELL_SIZE - offset, eyeSize, 0, Math.PI*2); ctx.fill();
                    } else if (direction.y === -1) {
                        ctx.beginPath(); ctx.arc(x + offset, y + 6, eyeSize, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(x + CELL_SIZE - offset, y + 6, eyeSize, 0, Math.PI*2); ctx.fill();
                    } else {
                        ctx.beginPath(); ctx.arc(x + offset, y + 14, eyeSize, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(x + CELL_SIZE - offset, y + 14, eyeSize, 0, Math.PI*2); ctx.fill();
                    }
                    ctx.shadowBlur = 0;
                }
            });
            
            // 绘制食物 - 更大的尺寸
            if (food) {
                const fx = food.x * CELL_SIZE + CELL_SIZE / 2;
                const fy = food.y * CELL_SIZE + CELL_SIZE / 2;
                const foodRadius = (CELL_SIZE / 2) * FOOD_SIZE_RATIO;
                
                ctx.save();
                ctx.translate(fx, fy);
                ctx.rotate(foodRotation);
                
                let foodColor, foodGlow, innerColor;
                if (foodType === 'speed') {
                    foodColor = '#00ff00';
                    foodGlow = 'rgba(0, 255, 0, 0.9)';
                    innerColor = '#ccffcc';
                } else if (foodType === 'time') {
                    foodColor = '#ffff00';
                    foodGlow = 'rgba(255, 255, 0, 0.9)';
                    innerColor = '#ffffcc';
                } else {
                    foodColor = '#ff00ff';
                    foodGlow = 'rgba(255, 0, 255, 0.9)';
                    innerColor = '#ffccff';
                }
                
                // 外层光晕
                ctx.shadowBlur = 30;
                ctx.shadowColor = foodGlow;
                
                // 绘制大星星
                ctx.fillStyle = foodColor;
                drawStar(ctx, 0, 0, 5, foodRadius * 1.2, foodRadius * 0.5);
                
                // 内层高光
                ctx.shadowBlur = 10;
                ctx.fillStyle = innerColor;
                drawStar(ctx, 0, 0, 5, foodRadius * 0.8, foodRadius * 0.3);
                
                // 中心点
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(0, 0, 3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
            
            drawParticles();
            
            // 加速特效边框
            if (isBoosting && boostEnergy > 0) {
                ctx.strokeStyle = 'rgba(255, 0, 255, 0.4)';
                ctx.lineWidth = 3;
                ctx.setLineDash([8, 8]);
                ctx.lineDashOffset = -Date.now() / 10;
                ctx.beginPath();
                ctx.rect(3, 3, canvas.width - 6, canvas.height - 6);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.lineDashOffset = 0;
            }
        }
        
        function roundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            ctx.fill();
        }
        
        function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let step = Math.PI / spikes;
            
            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                let x = cx + Math.cos(rot) * outerRadius;
                let y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;
                
                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fill();
        }
        
        function gameOver() {
            isGameOver = true;
            playSound('gameover');
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').classList.add('active');
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (isGameOver && e.code !== 'Space') {
                init();
                isPaused = false;
                document.getElementById('startHint').classList.add('hidden');
                requestAnimationFrame(update);
                return;
            }
            
            if (isPaused && ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
                isPaused = false;
                document.getElementById('startHint').classList.add('hidden');
                requestAnimationFrame(update);
            }
            
            switch(e.code) {
                case 'ArrowUp':
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    e.preventDefault();
                    break;
                case 'Space':
                    if (!isPaused && !isGameOver) {
                        isBoosting = true;
                        e.preventDefault();
                    }
                    break;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                isBoosting = false;
            }
        });
        
        document.getElementById('restartBtn').addEventListener('click', () => {
            init();
            isPaused = false;
            document.getElementById('startHint').classList.add('hidden');
            requestAnimationFrame(update);
        });
        
        // 触摸支持
        let touchStartX = 0;
        let touchStartY = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            if (isPaused) {
                isPaused = false;
                document.getElementById('startHint').classList.add('hidden');
                requestAnimationFrame(update);
            }
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            const touchY = e.touches[0].clientY;
            const dx = touchX - touchStartX;
            const dy = touchY - touchStartY;
            
            if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 0 && direction.x === 0) nextDirection = { x: 1, y: 0 };
                    else if (dx < 0 && direction.x === 0) nextDirection = { x: -1, y: 0 };
                } else {
                    if (dy > 0 && direction.y === 0) nextDirection = { x: 0, y: 1 };
                    else if (dy < 0 && direction.y === 0) nextDirection = { x: 0, y: -1 };
                }
                touchStartX = touchX;
                touchStartY = touchY;
            }
        });
        
        // 初始化
        init();
    </script>
</body>
</html>
